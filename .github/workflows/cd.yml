name: CD - Build Push and Update Config

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  USER_ECR_REPOSITORY: team4-dev-taskfarm-user
  ADMIN_ECR_REPOSITORY: team4-dev-taskfarm-admin
  CONFIG_REPO: CLD-05/team4-taskfarm-config
  CONFIG_DEV_PATH: apps/overlays/dev

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f user/Dockerfile -t $ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG

      - name: Build and push admin image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f admin/Dockerfile -t $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG

  update-config:
    name: Update config repo image tag
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config

      - name: Update image tags
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd config

          if [ ! -d "$CONFIG_DEV_PATH" ]; then
            echo "Config path not found: $CONFIG_DEV_PATH"
            exit 1
          fi

          cd "$CONFIG_DEV_PATH"

          kustomize edit set image taskfarm-user=team4-dev-taskfarm-user:$IMAGE_TAG
          kustomize edit set image taskfarm-admin=team4-dev-taskfarm-admin:$IMAGE_TAG

      - name: Commit and push config changes
        run: |
          cd config

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "chore: update dev image tag ${{ needs.build-and-push.outputs.image_tag }}" || echo "No changes to commit"
          git push
