name: CD - Build Push and Update Config

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  USER_ECR_REPOSITORY: team4-dev-taskfarm-user
  ADMIN_ECR_REPOSITORY: team4-dev-taskfarm-admin
  # [주석 처리] config 레포가 아직 작성 중이라 update-config job을 비활성화.
  #   config 구조(manifests/{user,admin}/overlays/dev)와 image name이 확정되면
  #   아래 update-config job과 함께 주석 해제하고 경로를 맞출 것.
  # CONFIG_REPO: CLD-05/team4-taskfarm-config
  # CONFIG_DEV_PATH: manifests/user/overlays/dev   # ← 실제 구조로 (기존 apps/overlays/dev는 없는 경로)

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f user/Dockerfile -t $ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG

      - name: Build and push admin image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f admin/Dockerfile -t $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG

  # =====================================================================
  # [주석 처리] update-config job — config 레포 작성 완료 후 활성화
  #
  #   현재 config 레포가 스켈레톤(주석만) 상태라, 이미지 태그를 갱신할
  #   kustomization이 아직 없음. 활성화 전 맞춰야 할 것:
  #     1. CONFIG_DEV_PATH: user/admin이 분리된 구조라 경로가 2개
  #        (manifests/user/overlays/dev, manifests/admin/overlays/dev)
  #     2. kustomize image name: config의 images[].name과 좌변 통일
  #        (권장: 논리명 taskfarm-user + newName(ECR경로) + newTag 구조)
