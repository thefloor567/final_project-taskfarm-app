name: CD - Build Push and Update Config

on:
  push:
    branches:
      - main

permissions:
  id-token: write      # OIDC로 AWS 인증
  contents: read

env:
  AWS_REGION: ap-northeast-2
  USER_ECR_REPOSITORY: team4-dev-taskfarm-user
  ADMIN_ECR_REPOSITORY: team4-dev-taskfarm-admin
  CONFIG_REPO: CLD-05/team4-taskfarm-config
  ENV_PREFIX: dev      # ← prod 갈 때 prod ECR + prod-{sha}로 환경 job 추가/분기

jobs:
  # =====================================================================
  # 1) 이미지 빌드 + ECR 푸시
  # =====================================================================
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        # 환경 prefix + 짧은 SHA  →  예: dev-a1b2c3d
        run: echo "image_tag=${ENV_PREFIX}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f user/Dockerfile -t "$ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG"

      - name: Build and push admin image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f admin/Dockerfile -t "$ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG"

  # =====================================================================
  # 2) config 레포의 dev 오버레이 이미지 태그 갱신 (GitOps)
  #    ArgoCD가 config 변경을 감지 → dev 클러스터에 새 이미지 배포
  # =====================================================================
  update-config:
    name: Update config repo image tag (dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}   # config 레포 push 권한 PAT
          path: config

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Update image tags (user / admin)
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
        run: |
          cd config
          # user dev overlay  (config images[].name == taskfarm-user-img)
          (cd manifests/user/overlays/dev && \
            kustomize edit set image taskfarm-user-img="$ECR_REGISTRY/$USER_ECR_REPOSITORY:$IMAGE_TAG")
          # admin dev overlay (config images[].name == taskfarm-admin-img)
          (cd manifests/admin/overlays/dev && \
            kustomize edit set image taskfarm-admin-img="$ECR_REGISTRY/$ADMIN_ECR_REPOSITORY:$IMAGE_TAG")

      - name: Commit and push config changes
        run: |
          cd config
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(dev): update image tag ${{ needs.build-and-push.outputs.image_tag }}" \
            || echo "No changes to commit"
          git push
