name: CD - Build Push and Update Config
on:
  push:
    branches:
      - main            # dev 자동 배포 트리거
  workflow_dispatch:    # prod 수동 트리거 (Actions 화면의 "Run workflow" 버튼)
    inputs:
      deploy_prod:
        description: 'prod 배포 (체크하면 prod 빌드/배포 진행, 승인 필요)'
        type: boolean
        default: false

permissions:
  id-token: write      # OIDC로 AWS 인증
  contents: read

env:
  AWS_REGION: ap-northeast-2
  USER_ECR_DEV: team4-dev-taskfarm-user
  ADMIN_ECR_DEV: team4-dev-taskfarm-admin
  USER_ECR_PROD: team4-prod-taskfarm-user
  ADMIN_ECR_PROD: team4-prod-taskfarm-admin
  CONFIG_REPO: CLD-05/team4-taskfarm-config

jobs:
  build-and-push-dev:
    name: Build and Push to ECR (dev)
    runs-on: ubuntu-latest
    # push로 들어왔을 때만 (수동 prod 트리거 때는 dev 빌드 안 함)
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: echo "image_tag=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f user/Dockerfile -t "$ECR_REGISTRY/$USER_ECR_DEV:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$USER_ECR_DEV:$IMAGE_TAG"

      - name: Build and push admin image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f admin/Dockerfile -t "$ECR_REGISTRY/$ADMIN_ECR_DEV:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ADMIN_ECR_DEV:$IMAGE_TAG"

  update-config-dev:
    name: Update config (dev)
    runs-on: ubuntu-latest
    needs: build-and-push-dev
    if: github.event_name == 'push'
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update dev image tags
        env:
          IMAGE_TAG: ${{ needs.build-and-push-dev.outputs.image_tag }}
          ECR_REGISTRY: ${{ needs.build-and-push-dev.outputs.ecr_registry }}
        run: |
          cd config
          (cd manifests/user/overlays/dev && \
            kustomize edit set image taskfarm-user-img="$ECR_REGISTRY/$USER_ECR_DEV:$IMAGE_TAG")
          (cd manifests/admin/overlays/dev && \
            kustomize edit set image taskfarm-admin-img="$ECR_REGISTRY/$ADMIN_ECR_DEV:$IMAGE_TAG")

      - name: Commit and push
        run: |
          cd config
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(dev): update image tag ${{ needs.build-and-push-dev.outputs.image_tag }}" \
            || echo "No changes to commit"
          git push

  build-and-push-prod:
    name: Build and Push to ECR (prod)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_prod == true
    environment: production    # ← 승인 게이트 (Settings>Environments에서 reviewer 설정)
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: echo "image_tag=prod-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push user image (prod)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f user/Dockerfile -t "$ECR_REGISTRY/$USER_ECR_PROD:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$USER_ECR_PROD:$IMAGE_TAG"

      - name: Build and push admin image (prod)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          docker build -f admin/Dockerfile -t "$ECR_REGISTRY/$ADMIN_ECR_PROD:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ADMIN_ECR_PROD:$IMAGE_TAG"

  update-config-prod:
    name: Update config (prod)
    runs-on: ubuntu-latest
    needs: build-and-push-prod
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update prod image tags
        env:
          IMAGE_TAG: ${{ needs.build-and-push-prod.outputs.image_tag }}
          ECR_REGISTRY: ${{ needs.build-and-push-prod.outputs.ecr_registry }}
        run: |
          cd config
          (cd manifests/user/overlays/prod && \
            kustomize edit set image taskfarm-user-img="$ECR_REGISTRY/$USER_ECR_PROD:$IMAGE_TAG")
          (cd manifests/admin/overlays/prod && \
            kustomize edit set image taskfarm-admin-img="$ECR_REGISTRY/$ADMIN_ECR_PROD:$IMAGE_TAG")

      - name: Commit and push
        run: |
          cd config
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(prod): update image tag ${{ needs.build-and-push-prod.outputs.image_tag }}" \
            || echo "No changes to commit"
          git push
