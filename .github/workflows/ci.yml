name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Project
        run: mvn clean install

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint user Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: user/Dockerfile
          ignore: DL3008

      - name: Lint admin Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: admin/Dockerfile
          ignore: DL3008