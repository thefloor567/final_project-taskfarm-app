<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('홈')}"></head>
<body>
<!-- position:relative → FAB 버튼(absolute) 기준점 -->
<div class="app-shell" style="position: relative;">

    <div th:replace="~{fragments/header :: header-main}"></div>

    <div id="scrollContainer">
        <div class="p-4 d-flex flex-column gap-4">

            <!-- 인사 -->
            <div>
                <h2 class="fw-bolder fs-3 text-gray-900 mb-1">
                    안녕하세요, <span id="nickname">농부</span>님 👋
                </h2>
                <p class="text-gray-500 fs-7 mb-0">오늘도 할일을 끝내고 농장을 가꿔봐요</p>
            </div>

            <!-- 상태 요약: 레벨/물방울/코인 -->
            <div class="row g-3">
                <div class="col-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <div style="font-size: 28px;"
                            	 data-bs-toggle="tooltip"
                            	 data-bs-placement="top"
                            	 title="레벨이 높아질수록 필요한 경험치가 늘어나요!">⭐</div>
                            <div class="fw-bold fs-4 text-gray-900 mt-1" id="level">Lv.1</div>
                            <div class="fs-9 text-gray-500">레벨</div>
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <div style="font-size: 28px;"
                            	 data-bs-toggle="tooltip"
                            	 data-bs-placement="top"
                            	 title="레벨업하면 물방울 5개를 받아요. 농장 성장에 사용할 수 있어요!">💧</div>
                            <div class="fw-bold fs-4 text-gray-900 mt-1" id="water">0</div>
                            <div class="fs-9 text-gray-500">물방울</div>
                        </div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-body text-center py-4">
                            <div style="font-size: 28px;"
                            	 data-bs-toggle="tooltip"
                            	 data-bs-placement="top"
                            	 title="코인은 작물을 팔아서 얻고, 씨앗·도구·밭을 살 때 사용해요!">🪙</div>
                            <div class="fw-bold fs-4 text-gray-900 mt-1" id="coin">0</div>
                            <div class="fs-9 text-gray-500">코인</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 경험치 바 -->
            <div class="card shadow-sm">
                <div class="card-body py-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-semibold fs-7 text-gray-700">다음 레벨까지</span>
                        <span class="fs-8 text-gray-500"><span id="xpNow">0</span> / <span id="xpMax">100</span> XP</span>
                    </div>
                    <div class="progress" style="height: 10px;">
                        <div id="xpBar" class="progress-bar bg-primary" role="progressbar"
                             style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- 오늘 할일 요약 -->
            <div class="card shadow-sm">
                <div class="card-header">
                    <h3 class="card-title fs-6">✅ 오늘 할일</h3>
                    <div class="card-toolbar">
                        <a href="/todo/list" class="btn btn-sm btn-light">전체보기</a>
                    </div>
                </div>
                <div class="card-body py-3" id="todoSummary">
                    <span class="fs-7 text-gray-400">불러오는 중...</span>
                </div>
            </div>

            <!-- 농장 바로가기 -->
            <div class="card shadow-sm" style="cursor:pointer;" onclick="location.href='/farm'">
                <div class="card-body py-4 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <span style="font-size: 32px;">🌱</span>
                        <div>
                            <div class="fw-bold fs-6 text-gray-800">내 농장 가기</div>
                            <div class="fs-8 text-gray-500">밭을 가꾸고 작물을 수확하세요</div>
                        </div>
                    </div>
                    <i class="ki-duotone ki-arrow-right fs-2 text-gray-400">
                        <span class="path1"></span><span class="path2"></span>
                    </i>
                </div>
            </div>

        </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('home')}"></div>

</div>

<script th:src="@{/plugins/global/plugins.bundle.js}"></script>
<script th:src="@{/js/scripts.bundle.js}"></script>
<script>
// 🚧 퍼블리싱 단계: API 연동 전이라 더미로 표시.
//    홈 API(/api/home) 나오면 fetch로 교체 (아래 loadHome 주석 참고).
document.addEventListener('DOMContentLoaded', function () {
    loadHome();

    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    tooltipTriggerList.forEach(function (tooltipTriggerEl) {
        new bootstrap.Tooltip(tooltipTriggerEl);
    });
});

function loadHome() {
    fetch('/api/home', { credentials: 'include' })
    .then(res => {
        if (res.status === 401) { location.href = '/'; return; }
        return res.json();
    })
    .then(res => {
        if (!res || !res.result) return;
        const d = res.data;
        document.getElementById('nickname').textContent = d.nickName;
        document.getElementById('level').textContent = 'Lv.' + d.level;
        document.getElementById('water').textContent = d.water;
        document.getElementById('coin').textContent = d.coin;
        document.getElementById('xpNow').textContent = d.xpNow;
        document.getElementById('xpMax').textContent = d.xpMax;
        document.getElementById('xpBar').style.width = (d.xpNow / d.xpMax * 100) + '%';
        
        const summary = document.getElementById('todoSummary');
        if(d.totalTodo === 0){
        	summary.innerHTML = '<span class="fs-7 text-gray-400">오늘 할일이 없어요. 할일을 추가해보세요!</span>';
        }
        else{
        	summary.innerHTML = `<span class="fs-7 text-gray-700">전체 ${d.totalTodo}개 중 <b>${d.doneTodo}개</b> 완료</span>`;
        }
    })
    .catch(err => console.error(err));
}
</script>
</body>
</html>
