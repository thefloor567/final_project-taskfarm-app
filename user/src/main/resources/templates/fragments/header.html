<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

    <!-- 기본 홈 헤더 -->
    <th:block th:fragment="header-main">
        <div class="d-flex flex-column-auto bg-white border-bottom px-4 py-3">
            <div class="d-flex justify-content-between align-items-center w-100">
                <span class="fw-bolder fs-3 text-gray-900">🌾 TaskFarm</span>
                <a href="/mypage" class="btn btn-sm btn-icon btn-light">
                    <i class="ki-duotone ki-user fs-3">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                </a>
            </div>
        </div>
    </th:block>

    <!-- 뒤로가기 헤더 -->
    <th:block th:fragment="header-back(title)">
        <div class="d-flex flex-column-auto bg-white border-bottom px-4 py-3">
            <div class="d-flex justify-content-between align-items-center w-100">
                <button class="btn btn-sm btn-icon btn-light" onclick="history.back()">
                    <i class="ki-duotone ki-arrow-left fs-3">
                        <span class="path1"></span>
                        <span class="path2"></span>
                    </i>
                </button>
                <span class="fw-bold fs-5 text-gray-900" th:text="${title}"></span>
                <div style="width: 34px;"></div>
            </div>
        </div>
    </th:block>

</body>
</html>
