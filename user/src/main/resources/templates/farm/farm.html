<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('농장')}"></head>

<body>
  <div class="app-shell" style="position: relative;">

    <div th:replace="~{fragments/header :: header-main}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-4">

        <!-- 자원 바 (물방울/코인) -->
        <div class="card shadow-sm">
          <div class="card-body py-3">
            <div class="d-flex justify-content-around align-items-center">
              <div class="text-center">
                <div style="font-size:24px;" data-bs-toggle="tooltip" data-bs-html="true" data-bs-placement="bottom"
                  title="할 일을 완료하면 모여요<br>작물에 물을 줄 때 사용해요">💧</div>
                <div class="fw-bold fs-5 text-gray-900" id="water">0</div>
                <div class="fs-9 text-gray-500">물방울</div>
              </div>
              <div style="width:1px;height:40px;background:#eee;"></div>
              <div class="text-center">
                <div style="font-size:24px;" data-bs-toggle="tooltip" data-bs-html="true" data-bs-placement="bottom"
                  title="작물·주문으로 얻어요<br>상점에서 사용해요">🪙</div>
                <div class="fw-bold fs-5 text-gray-900" id="coin">0</div>
                <div class="fs-9 text-gray-500">코인</div>
              </div>
              <div style="width:1px;height:40px;background:#eee;"></div>
              <div class="text-center">
                <div style="font-size:24px;" data-bs-toggle="tooltip" data-bs-html="true" data-bs-placement="bottom"
                  title="수확해서 모은 작물이에요<br>주민 주문에 사용해요">🌾</div>
                <div class="fw-bold fs-5 text-gray-900" id="cropCount">0</div>
                <div class="fs-9 text-gray-500">작물</div>
              </div>
              <div style="width:1px;height:40px;background:#eee;"></div>
              <!-- 시드스트릭: 연속 완료일. 높을수록 좋은 이벤트 확률↑ -->
              <div class="text-center">
                <div style="font-size:24px;" data-bs-toggle="tooltip" data-bs-html="true" data-bs-placement="bottom"
                  title="할 일 연속 완료 일수예요<br>높을수록 좋은 이벤트가 나와요">🔥</div>
                <div class="fw-bold fs-5 text-gray-900" id="streak">0</div>
                <div class="fs-9 text-gray-500">스트릭</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 오늘의 이벤트 배너 -->
        <div id="eventBanner" class="card shadow-sm border-0 d-none"
          style="background: linear-gradient(135deg, #FFA800, #FF6B35);">
          <div class="card-body py-3 d-flex justify-content-between align-items-center">
            <div class="text-white">
              <div class="fw-bold fs-6" id="eventTitle">🎉 오늘의 이벤트</div>
              <div class="fs-8 opacity-75" id="eventDesc">설명</div>
            </div>
            <button class="btn btn-sm btn-light" onclick="dismissEvent()">확인</button>
          </div>
        </div>

        <!-- 바로가기 -->
        <div class="row g-2">
          <div class="col">
            <div class="card shadow-sm h-100" style="cursor:pointer;" onclick="location.href='/farm/shop/seeds'">
              <div class="card-body text-center py-3 px-1">
                <div style="font-size:22px;">🌱</div>
                <div class="fs-9 fw-semibold text-gray-700 mt-1">씨앗</div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card shadow-sm h-100" style="cursor:pointer;" onclick="location.href='/farm/shop/tools'">
              <div class="card-body text-center py-3 px-1">
                <div style="font-size:22px;">🛠️</div>
                <div class="fs-9 fw-semibold text-gray-700 mt-1">도구</div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card shadow-sm h-100" style="cursor:pointer;" onclick="location.href='/farm/shop/plots'">
              <div class="card-body text-center py-3 px-1">
                <div style="font-size:22px;">🟫</div>
                <div class="fs-9 fw-semibold text-gray-700 mt-1">밭</div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card shadow-sm h-100" style="cursor:pointer;" onclick="location.href='/farm/inventory'">
              <div class="card-body text-center py-3 px-1">
                <div style="font-size:22px;">🎒</div>
                <div class="fs-9 fw-semibold text-gray-700 mt-1">인벤</div>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card shadow-sm h-100" style="cursor:pointer;" onclick="location.href='/farm/orders'">
              <div class="card-body text-center py-3 px-1">
                <div style="font-size:22px;">📋</div>
                <div class="fs-9 fw-semibold text-gray-700 mt-1">주문</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 밭 그리드 -->
        <div>
          <h3 class="fw-bold fs-5 text-gray-900 mb-2">🌻 내 밭</h3>
          <div class="row g-3" id="plotGrid"></div>
        </div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('farm')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // ✅ 서버 권위. 모든 상태는 GET /api/farm 응답으로 채운다.
    let farm = { drops: 0, coin: 0, cropCount: 0, streak: 0 };
    let plots = [];
    let event = null;

    const STATUS_EMOJI = { growing: '🌱', ready: '🍅', withered: '🥀' };
    const CROP_EMOJI = { radish: '🥗', tomato: '🍅', corn: '🌽', pumpkin: '🎃', carrot: '🥕', strawberry: '🍓' };
    const EFFECT_BADGE = {
      scarecrow: { emoji: '🧑\u200d🌾', label: '허수아비' },
      greenhouse: { emoji: '🏡', label: '온실' },
      fertilizer: { emoji: '💩', label: '비료' }
    };
    // 위협 종류별 이모지
    const THREAT_BADGE = { crow: '🐦‍⬛', drought: '☀️', storm: '🌪️', pest: '🐛' };
    // 위협 종류별 방어 수단 이모지 (막았을 때 표시)
    const DEFENSE_BADGE = { crow: '🧑\u200d🌾', pest: '🧑\u200d🌾', drought: '🏡' };
    // 위협 종류별 한국어 이름 (알림 문구용)
    const THREAT_NAME = { crow: '까마귀', drought: '가뭄', storm: '폭풍', pest: '해충' };

    document.addEventListener('DOMContentLoaded', function () { loadFarm(); });

    async function loadFarm() {
      try {
        const res = await fetch('/api/farm', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('농장 조회 실패: ' + res.status);
        const body = await res.json();
        const data = body.data ?? body;

        farm = {
          drops: data.drops ?? 0,
          coin: data.coin ?? 0,
          cropCount: data.cropCount ?? 0,
          streak: data.streak ?? 0
        };
        plots = (data.plots ?? []).map(p => ({
          plotId: p.plotId,
          status: p.status,
          cropName: p.cropName,
          code: p.code,
          watered: p.watered ?? 0,
          total: p.total ?? 0,
          effects: p.effects ?? [],
          threat: p.threat ?? null
        }));
        event = data.event ?? null;

        renderResources();
        renderPlots();
        showEvent();
      } catch (e) {
        console.error(e);
        Swal.fire({
          text: '농장을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.',
          icon: 'error', buttonsStyling: false, confirmButtonText: '확인',
          customClass: { confirmButton: 'btn btn-primary' }
        });
      }
    }

    function renderResources() {
      document.getElementById('water').textContent = farm.drops;
      document.getElementById('coin').textContent = farm.coin;
      document.getElementById('cropCount').textContent = farm.cropCount;
      document.getElementById('streak').textContent = farm.streak;
    }

    function showEvent() {
      if (!event || event.dismissed) return;
      document.getElementById('eventTitle').textContent = event.title;
      document.getElementById('eventDesc').textContent = event.desc;
      document.getElementById('eventBanner').classList.remove('d-none');
    }
    function dismissEvent() {
      document.getElementById('eventBanner').classList.add('d-none');
    }

    function cropIcon(p, statusKey) {
      if (p.code && CROP_EMOJI[p.code]) return CROP_EMOJI[p.code];
      return STATUS_EMOJI[statusKey];
    }

    function renderPlots() {
      const grid = document.getElementById('plotGrid');
      grid.innerHTML = '';

      plots.forEach(p => {
        const col = document.createElement('div');
        col.className = 'col-4';

        const name = p.cropName || '작물';
        let inner = '', bg = '#F5F8FA', action = '';

        // 까마귀/폭풍에 먹힌 빈 밭: 흔적 표시 + 누르면 안내
        const eaten = p.threat && p.threat.eaten;

        if (eaten) {
          const tname = THREAT_NAME[p.threat.type] || '재해';
          const temoji = THREAT_BADGE[p.threat.type] || '⚠️';
          inner = `<div style="font-size:32px;">${temoji}</div>
                     <div class="fs-9 text-danger fw-semibold">${tname}가 먹었어요</div>`;
          bg = '#FFF5F8';
          action = `eatenInfo('${p.threat.type}')`;
        } else if (p.status === 'empty') {
          inner = '<div style="font-size:32px;opacity:.3;">➕</div><div class="fs-9 text-gray-400">씨앗 심기</div>';
          action = `plantSeed(${p.plotId})`;
        } else if (p.status === 'growing') {
          inner = `<div style="font-size:36px;">${STATUS_EMOJI.growing}</div>
                     <div class="fs-8 fw-semibold text-gray-700">${name}</div>
                     <div class="fs-9 text-gray-500">💧 ${p.watered}/${p.total}</div>`;
          bg = '#E8FFF3'; action = `waterPlot(${p.plotId})`;
        } else if (p.status === 'ready') {
          inner = `<div style="font-size:36px;">${cropIcon(p, 'ready')}</div>
                     <div class="fs-8 fw-semibold text-gray-700">${name}</div>
                     <div class="fs-9 fw-bold text-success">수확 가능!</div>`;
          bg = '#FFF8DD'; action = `harvestPlot(${p.plotId})`;
        } else if (p.status === 'withered') {
          inner = `<div style="font-size:36px;">${STATUS_EMOJI.withered}</div>
                     <div class="fs-8 fw-semibold text-gray-500">${name}</div>
                     <div class="fs-9 text-danger">시듦</div>`;
          bg = '#FFF5F8'; action = `removeCrop(${p.plotId})`;
        }

        const effectBadges = (p.effects || []).map(e => {
          const b = EFFECT_BADGE[e.type];
          if (!b) return '';
          const uses = e.remainUses != null ? ` ${e.remainUses}` : '';
          return `<span class="badge badge-sm badge-light-primary" title="${b.label}">${b.emoji}${uses}</span>`;
        }).join('');

        // 위협 뱃지: 먹힘 / 막음(방어 수단 이모지) / 위협(작물 남음)
        let threatTag = '', threatBorder = '';
        if (p.threat) {
          const temoji = THREAT_BADGE[p.threat.type] || '⚠️';
          if (p.threat.eaten) {
            threatTag = `<span class="badge badge-sm badge-light-danger">${temoji} 먹힘</span>`;
            threatBorder = 'border:2px dashed var(--bs-danger);';
          } else if (p.threat.defended) {
            const demoji = DEFENSE_BADGE[p.threat.type] || '🛡️';
            threatTag = `<span class="badge badge-sm badge-light-success">${demoji} 막음</span>`;
            threatBorder = 'border:2px solid var(--bs-success);';
          } else {
            threatTag = `<span class="badge badge-sm badge-light-danger">${temoji} 위협</span>`;
            threatBorder = 'border:2px solid var(--bs-danger);';
          }
        }

        col.innerHTML = `
            <div class="card shadow-sm position-relative" style="cursor:pointer;background:${bg};${threatBorder};min-height:130px;"
                 onclick="${action}">
                ${effectBadges ? `<div class="position-absolute top-0 start-0 m-1 d-flex gap-1">${effectBadges}</div>` : ''}
                ${threatTag ? `<div class="position-absolute top-0 end-0 m-1">${threatTag}</div>` : ''}
                <div class="card-body d-flex flex-column align-items-center justify-content-center text-center py-3 px-1">${inner}</div>
            </div>
        `;
        grid.appendChild(col);
      });
    }

    // 먹힌 밭을 눌렀을 때 안내
    function eatenInfo(type) {
      const tname = THREAT_NAME[type] || '재해';
      const temoji = THREAT_BADGE[type] || '⚠️';
      Swal.fire({
        html: `${temoji} <b>${tname}가 작물을 먹었어요</b><br>
               <span style="font-size:13px;color:#888;">${defenseHint(type)}</span>`,
        icon: 'info', buttonsStyling: false, confirmButtonText: '확인',
        customClass: { confirmButton: 'btn btn-primary' }
      });
    }

    function defenseHint(type) {
      if (type === 'crow') return '허수아비를 설치하면 까마귀를 막을 수 있어요';
      if (type === 'storm') return '폭풍은 막을 수 없어요';
      if (type === 'drought') return '온실을 설치하면 가뭄을 막을 수 있어요';
      if (type === 'pest') return '허수아비를 설치하면 해충을 막을 수 있어요';
      return '도구를 설치해 작물을 보호하세요';
    }

    async function farmAction(url, method = 'POST', body = null) {
      try {
        const opt = { method, headers: { 'Accept': 'application/json' } };
        if (body) {
          opt.headers['Content-Type'] = 'application/json';
          opt.body = JSON.stringify(body);
        }
        const res = await fetch(url, opt);
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.result === false) {
          const err = new Error(data.message || '요청에 실패했어요.');
          err.serverMessage = data.message;
          throw err;
        }
        return data;
      } catch (e) {
        // 호출부에서 따로 처리하고 싶을 수 있으니, 기본 경고는 띄우되 에러도 던질 수 있게
        throw e;
      }
    }

    // 공통 경고 표시
    function showWarn(msg) {
      Swal.fire({
        text: msg, icon: 'warning',
        buttonsStyling: false, confirmButtonText: '확인',
        customClass: { confirmButton: 'btn btn-primary' }
      });
    }

    async function plantSeed(plotId) {
      let seeds = [];
      try {
        const res = await fetch('/api/farm/inventory/seeds', { headers: { 'Accept': 'application/json' } });
        const body = await res.json();
        seeds = (body.data ?? body) || [];
      } catch (e) {
        return Swal.fire({
          text: '씨앗 정보를 불러오지 못했어요.', icon: 'error',
          buttonsStyling: false, confirmButtonText: '확인',
          customClass: { confirmButton: 'btn btn-primary' }
        });
      }

      if (!seeds.length) {
        return Swal.fire({
          text: '보유한 씨앗이 없어요. 씨앗 상점에서 먼저 구매하세요 🌱',
          icon: 'info', buttonsStyling: false, confirmButtonText: '확인',
          customClass: { confirmButton: 'btn btn-primary' }
        });
      }

      const optionsHtml = seeds.map(s =>
        `<option value="${s.seedId}">${s.name} (물 ${s.waters}회 · 보유 ${s.qty})</option>`
      ).join('');

      const { value: seedId } = await Swal.fire({
        title: '어떤 씨앗을 심을까요?',
        html: `<select id="seedSelect" class="form-select" style="width:100%">
                 <option></option>${optionsHtml}
               </select>`,
        showCancelButton: true, confirmButtonText: '심기', cancelButtonText: '취소',
        buttonsStyling: false,
        customClass: { confirmButton: 'btn btn-primary', cancelButton: 'btn btn-light' },
        didOpen: () => {
          $('#seedSelect').select2({
            placeholder: '씨앗 선택',
            dropdownParent: $('.swal2-popup'),
            minimumResultsForSearch: Infinity
          });
        },
        preConfirm: () => {
          const v = $('#seedSelect').val();
          if (!v) { Swal.showValidationMessage('씨앗을 골라주세요.'); return false; }
          return v;
        }
      });
      if (!seedId) return;

      try {
        await farmAction(`/api/farm/plots/${plotId}/plant`, 'POST', { seedId: Number(seedId) });
        loadFarm();
      } catch (e) {
        showWarn(e.message);
      }
    }

    async function waterPlot(plotId) {
      try {
        await farmAction(`/api/farm/plots/${plotId}/water`, 'POST');
        loadFarm();
      } catch (e) {
        showWarn(e.message);
      }
    }

    async function harvestPlot(plotId) {
      // 수확하려는 밭의 현재 상태를 미리 파악 (먹힘 판별용)
      const target = plots.find(p => p.plotId === plotId);
      try {
        await farmAction(`/api/farm/plots/${plotId}/harvest`, 'POST');
        Swal.fire({
          text: '수확 완료! 🌾', icon: 'success',
          buttonsStyling: false, confirmButtonText: '확인',
          customClass: { confirmButton: 'btn btn-primary' }
        });
        loadFarm();
      } catch (e) {
        // 수확 실패 — 그 사이 위협(까마귀 등)에 먹혔으면 그에 맞는 안내
        if (target && target.threat && (target.threat.eaten || !target.threat.defended)) {
          const type = target.threat.type;
          const tname = THREAT_NAME[type] || '재해';
          const temoji = THREAT_BADGE[type] || '⚠️';
          Swal.fire({
            html: `${temoji} <b>${tname}가 먹었어요!</b><br>
                   <span style="font-size:13px;color:#888;">수확하려던 작물을 ${tname}가 가져갔어요</span>`,
            icon: 'warning', buttonsStyling: false, confirmButtonText: '확인',
            customClass: { confirmButton: 'btn btn-primary' }
          });
        } else {
          showWarn(e.message);
        }
        loadFarm();
      }
    }

    async function removeCrop(plotId) {
      try {
        await farmAction(`/api/farm/plots/${plotId}/crop`, 'DELETE');
        loadFarm();
      } catch (e) {
        showWarn(e.message);
      }
    }
  </script>
</body>

</html>
