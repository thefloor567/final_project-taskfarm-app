<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('씨앗 상점')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('씨앗 상점')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 보유 코인 -->
        <div class="card shadow-sm">
          <div class="card-body py-3 d-flex justify-content-between align-items-center">
            <span class="fw-semibold fs-6 text-gray-700">보유 코인</span>
            <span class="fw-bolder fs-4 text-gray-900">🪙 <span id="coin">0</span></span>
          </div>
        </div>

        <!-- 씨앗 목록 -->
        <div id="seedContainer" class="d-flex flex-column gap-2"></div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('farm')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // ✅ 서버 권위. coin·재고는 GET /api/shop/seeds 와 농장 조회로 채운다. (프론트 더미·직접차감 금지)
    let coin = 0;
    let seeds = [];

    // 작물 코드 → 이모지 (표시용. 서버는 이모지를 안 내려주므로 프론트 매핑)
    const EMOJI = { radish: '🥗', tomato: '🍅', corn: '🌽', pumpkin: '🎃', carrot: '🥕', strawberry: '🍓' };
    function emojiOf(code) { return EMOJI[code] || '🌱'; }

    document.addEventListener('DOMContentLoaded', function () {
      loadShop();
    });

    // 상점 목록 + 현재 코인 로드
    async function loadShop() {
      try {
        // 코인은 농장 스냅샷에서
        const farmRes = await fetch('/api/farm', { headers: { 'Accept': 'application/json' } });
        const farmBody = await farmRes.json();
        coin = (farmBody.data ?? farmBody).coin ?? 0;

        // 진열 목록
        const res = await fetch('/api/shop/seeds', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('상점을 불러오지 못했어요.');
        const body = await res.json();
        seeds = (body.data ?? body) || [];

        render();
      } catch (e) {
        warn(e.message || '상점을 불러오지 못했어요.');
      }
    }

    function render() {
      document.getElementById('coin').textContent = coin;
      const box = document.getElementById('seedContainer');
      box.innerHTML = '';

      seeds.forEach(s => {
        const soldOut = s.stock <= 0;
        const tooPoor = coin < s.price;
        const disabled = soldOut || tooPoor;

        let btnLabel = `🪙 ${s.price}`;
        if (soldOut) btnLabel = '품절';
        else if (tooPoor) btnLabel = '코인 부족';

        const card = document.createElement('div');
        card.className = 'card shadow-sm';
        card.innerHTML = `
            <div class="card-body py-3">
                <div class="d-flex align-items-center gap-3">
                    <div style="font-size:36px;">${emojiOf(s.code)}</div>
                    <div class="flex-grow-1">
                        <div class="fw-bold fs-6 text-gray-800">${s.name}</div>
                        <div class="d-flex gap-2 mt-1">
                            <span class="badge badge-sm badge-light-secondary">재고 ${soldOut ? 0 : s.stock}</span>
                            <span class="badge badge-sm badge-light-info">물 ${s.waters}회</span>
                        </div>
                    </div>
                    <button class="btn btn-sm ${disabled ? 'btn-light text-gray-400' : 'btn-primary'}"
                            ${disabled ? 'disabled' : ''}
                            onclick="buySeed(${s.seedId})">
                        ${btnLabel}
                    </button>
                </div>
            </div>
        `;
        box.appendChild(card);
      });
    }

    async function buySeed(seedId) {
      const s = seeds.find(x => x.seedId === seedId);
      if (!s) return;

      // 사전 안내(UX용). 실제 검증·차감은 전부 서버가 함 — 콘솔 조작으로 우회 불가.
      if (coin < s.price) return warn('코인이 부족해요!');
      if (s.stock <= 0) return warn('품절된 씨앗이에요.');

      try {
        const res = await fetch('/api/shop/seeds/buy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ seedId, qty: 1 })
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok || body.result === false) {
          throw new Error(body.message || '구매에 실패했어요.');
        }

        // 서버 최신 상태로 다시 로드 (직접 차감 안 함)
        await loadShop();

        Swal.fire({
          text: `${s.name}을(를) 구매했어요! 인벤토리에 담겼습니다.`,
          icon: 'success', buttonsStyling: false, confirmButtonText: '확인',
          customClass: { confirmButton: 'btn btn-primary' }
        });
      } catch (e) {
        warn(e.message);
      }
    }

    function warn(msg) {
      Swal.fire({
        text: msg, icon: "warning", buttonsStyling: false,
        confirmButtonText: "확인", customClass: { confirmButton: "btn btn-primary" }
      });
    }
  </script>
</body>

</html>
