<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('씨앗 상점')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('씨앗 상점')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 보유 코인 -->
        <div class="card shadow-sm">
          <div class="card-body py-3 d-flex justify-content-between align-items-center">
            <span class="fw-semibold fs-6 text-gray-700">보유 코인</span>
            <span class="fw-bolder fs-4 text-gray-900">🪙 <span id="coin">0</span></span>
          </div>
        </div>

        <!-- 씨앗 목록 -->
        <div id="seedContainer" class="d-flex flex-column gap-2"></div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('farm')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // 🚧 더미. API(/api/farm/shop/seeds) 나오면 교체.
    let coin = 240;
    let seeds = [
      { seedId: 1, name: '토마토 씨앗', emoji: '🍅', price: 30, stock: 99, dailyLimit: 5, boughtToday: 1 },
      { seedId: 2, name: '당근 씨앗', emoji: '🥕', price: 20, stock: 99, dailyLimit: 5, boughtToday: 0 },
      { seedId: 3, name: '옥수수 씨앗', emoji: '🌽', price: 50, stock: 10, dailyLimit: 3, boughtToday: 3 },
      { seedId: 4, name: '딸기 씨앗', emoji: '🍓', price: 80, stock: 0, dailyLimit: 2, boughtToday: 0 },
    ];

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('coin').textContent = coin;
      render();
    });

    function render() {
      document.getElementById('coin').textContent = coin;
      const box = document.getElementById('seedContainer');
      box.innerHTML = '';

      seeds.forEach(s => {
        const remaining = s.dailyLimit - s.boughtToday;   // 오늘 남은 구매수
        const soldOut = s.stock <= 0;
        const limitReached = remaining <= 0;
        const tooPoor = coin < s.price;
        const disabled = soldOut || limitReached || tooPoor;

        // 버튼 라벨
        let btnLabel = `🪙 ${s.price}`;
        if (soldOut) btnLabel = '품절';
        else if (limitReached) btnLabel = '오늘 마감';
        else if (tooPoor) btnLabel = '코인 부족';

        const card = document.createElement('div');
        card.className = 'card shadow-sm';
        card.innerHTML = `
            <div class="card-body py-3">
                <div class="d-flex align-items-center gap-3">
                    <div style="font-size:36px;">${s.emoji}</div>
                    <div class="flex-grow-1">
                        <div class="fw-bold fs-6 text-gray-800">${s.name}</div>
                        <div class="d-flex gap-2 mt-1">
                            <span class="badge badge-sm badge-light-secondary">재고 ${soldOut ? 0 : s.stock}</span>
                            <span class="badge badge-sm ${remaining > 0 ? 'badge-light-primary' : 'badge-light-danger'}">
                                오늘 ${remaining > 0 ? remaining + '개 남음' : '구매 마감'}
                            </span>
                        </div>
                    </div>
                    <button class="btn btn-sm ${disabled ? 'btn-light text-gray-400' : 'btn-primary'}"
                            ${disabled ? 'disabled' : ''}
                            onclick="buySeed(${s.seedId})">
                        ${btnLabel}
                    </button>
                </div>
            </div>
        `;
        box.appendChild(card);
      });
    }

    function buySeed(seedId) {
      const s = seeds.find(x => x.seedId === seedId);
      if (!s) return;

      // 사전 체크 (실제 검증은 서버가 권위 — 콘솔 조작 무한구매 방지)
      if (coin < s.price) return warn("코인이 부족해요!");
      if (s.stock <= 0) return warn("품절된 씨앗이에요.");
      if (s.dailyLimit - s.boughtToday <= 0) return warn("오늘 구매 한도에 도달했어요.");

      // 🚧 POST /api/farm/shop/seeds/{id}/buy
      //    서버가 코인 차감·재고·하루한도 검증 후 인벤토리 적립.
      //    응답으로 갱신된 coin/stock/boughtToday 받아서 반영하는 게 정석.
      coin -= s.price;
      s.stock--;
      s.boughtToday++;
      render();

      Swal.fire({
        text: `${s.name}을(를) 구매했어요! 인벤토리에 담겼습니다.`,
        icon: "success", buttonsStyling: false, confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-primary" }
      });
    }

    function warn(msg) {
      Swal.fire({
        text: msg, icon: "warning", buttonsStyling: false,
        confirmButtonText: "확인", customClass: { confirmButton: "btn btn-primary" }
      });
    }
  </script>
</body>

</html>
