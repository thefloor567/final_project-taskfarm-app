<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('인벤토리')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('인벤토리')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 탭 -->
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-sm btn-primary flex-fill tab-btn" data-tab="seeds"
            onclick="selectTab(this)">🌱 보유 씨앗</button>
          <button type="button" class="btn btn-sm btn-light flex-fill tab-btn" data-tab="crops"
            onclick="selectTab(this)">🌾 수확 작물</button>
        </div>

        <!-- 비었을 때 -->
        <div id="emptyState" class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none">
          <span style="font-size:48px;" id="emptyIcon">📦</span>
          <span class="fs-5 fw-semibold text-gray-500" id="emptyMsg">비어 있어요</span>
        </div>

        <!-- 그리드 -->
        <div class="row g-3" id="itemGrid"></div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('farm')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    let currentTab = 'seeds';

    // ✅ 서버 권위. 두 탭 모두 API에서 받아온다.
    //   씨앗: GET /api/farm/inventory/seeds
    //   작물: GET /api/farm/inventory/crops
    let seedInventory = [];
    let cropInventory = [];
    let loaded = { seeds: false, crops: false };

    // code → 이모지 (다른 화면과 동일 매핑)
    const EMOJI = { radish: '🥗', tomato: '🍅', corn: '🌽', pumpkin: '🎃', carrot: '🥕', strawberry: '🍓' };
    function emojiOf(code) { return EMOJI[code] || '🌱'; }

    document.addEventListener('DOMContentLoaded', function () {
      loadTab('seeds');   // 첫 탭 로드
    });

    function selectTab(btn) {
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('btn-primary'); b.classList.add('btn-light');
      });
      btn.classList.remove('btn-light'); btn.classList.add('btn-primary');
      currentTab = btn.dataset.tab;
      loadTab(currentTab);
    }

    // 탭 데이터 로드 (한 번 받아오면 캐시)
    async function loadTab(tab) {
      if (loaded[tab]) { render(); return; }

      const url = tab === 'seeds'
        ? '/api/farm/inventory/seeds'
        : '/api/farm/inventory/crops';

      try {
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('불러오지 못했어요');
        const body = await res.json();
        const data = (body.data ?? body) || [];

        if (tab === 'seeds') {
          // 씨앗 응답: { seedId, name, waters, qty }
          seedInventory = data.map(s => ({
            seedId: s.seedId,
            name: s.name,
            code: s.code,            // 씨앗 응답에 code가 없으면 undefined → 기본 이모지
            count: s.qty
          }));
        } else {
          // 작물 응답: { seedId, name, code, count }
          cropInventory = data.map(c => ({
            seedId: c.seedId,
            name: c.name,
            code: c.code,
            count: c.count
          }));
        }
        loaded[tab] = true;
        render();
      } catch (e) {
        console.error(e);
        render();   // 빈 상태로라도 그림
      }
    }

    function render() {
      const grid = document.getElementById('itemGrid');
      const empty = document.getElementById('emptyState');
      grid.innerHTML = '';

      const list = currentTab === 'seeds' ? seedInventory : cropInventory;

      if (!list || list.length === 0) {
        empty.classList.remove('d-none');
        document.getElementById('emptyIcon').textContent = currentTab === 'seeds' ? '🌱' : '🌾';
        document.getElementById('emptyMsg').textContent =
          currentTab === 'seeds' ? '보유한 씨앗이 없어요' : '수확한 작물이 없어요';
        return;
      }
      empty.classList.add('d-none');

      list.forEach(item => {
        const col = document.createElement('div');
        col.className = 'col-4';

        col.innerHTML = `
            <div class="card shadow-sm" style="cursor:pointer;" onclick="location.href='${goTo}'">
                <div class="card-body text-center py-4 px-1 position-relative">
                    <div style="font-size:36px;">${emojiOf(item.code)}</div>
                    <div class="fw-bold fs-7 text-gray-800 mt-1">${item.name}</div>
                    ${actionHint}
                    <span class="badge badge-circle badge-primary position-absolute"
                          style="top:8px; right:8px;">${item.count}</span>
                </div>
            </div>
        `;
        grid.appendChild(col);
      });
    }
  </script>
</body>

</html>
