<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('주민 주문')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('주민 주문')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 안내 -->
        <div class="card shadow-sm border-0" style="background:#F1FAFF;">
          <div class="card-body py-3">
            <span class="fs-7 text-gray-700">
              🧺 주민들이 작물을 원해요. 보유 작물로 주문을 이행하면 코인을 받아요!
            </span>
          </div>
        </div>

        <!-- 주문 슬롯 목록 -->
        <div id="orderContainer" class="d-flex flex-column gap-2"></div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('farm')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // 🚧 더미. API(/api/farm/orders) 나오면 교체.
    // 보유 작물 (이행 가능 판단용) — 실제론 /api/farm/inventory/crops 와 동기화
    let myCrops = { '토마토': 8, '딸기': 2, '당근': 0 };

    let orders = [
      { orderId: 1, resident: '🐰 토끼', crop: '토마토', emoji: '🍅', need: 5, reward: 120 },
      { orderId: 2, resident: '🐻 곰', crop: '딸기', emoji: '🍓', need: 4, reward: 200 },
      { orderId: 3, resident: '🐱 고양이', crop: '당근', emoji: '🥕', need: 3, reward: 90 },
    ];

    document.addEventListener('DOMContentLoaded', function () {
      render();
    });

    function render() {
      const box = document.getElementById('orderContainer');
      box.innerHTML = '';

      orders.forEach(o => {
        const have = myCrops[o.crop] || 0;
        const canFulfill = have >= o.need;

        const card = document.createElement('div');
        card.className = 'card shadow-sm';
        card.innerHTML = `
            <div class="card-body py-3">
                <div class="d-flex align-items-center gap-3">
                    <div style="font-size:32px;">${o.emoji}</div>
                    <div class="flex-grow-1">
                        <div class="fw-bold fs-6 text-gray-800">${o.resident}</div>
                        <div class="fs-7 text-gray-600 mt-1">
                            ${o.crop} <b>${o.need}</b>개 필요
                            <span class="text-gray-400">(보유 ${have})</span>
                        </div>
                        <div class="fs-8 text-warning fw-semibold mt-1">🪙 보상 ${o.reward}</div>
                    </div>
                    <button class="btn btn-sm ${canFulfill ? 'btn-primary' : 'btn-light text-gray-400'}"
                            ${canFulfill ? '' : 'disabled'}
                            onclick="fulfillOrder(${o.orderId})">
                        ${canFulfill ? '이행' : '작물 부족'}
                    </button>
                </div>
            </div>
        `;
        box.appendChild(card);
      });
    }

    function fulfillOrder(orderId) {
      const o = orders.find(x => x.orderId === orderId);
      if (!o) return;

      const have = myCrops[o.crop] || 0;
      if (have < o.need) {
        return Swal.fire({
          text: "작물이 부족해요!", icon: "warning",
          buttonsStyling: false, confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        });
      }

      Swal.fire({
        html: `${o.resident}에게 ${o.crop} ${o.need}개를 주고<br><b class="text-warning">🪙 ${o.reward}</b> 받을까요?`,
        icon: "question", buttonsStyling: false, showCancelButton: true,
        confirmButtonText: "이행", cancelButtonText: "취소",
        customClass: { confirmButton: "btn btn-primary", cancelButton: "btn btn-light" }
      }).then(result => {
        if (!result.isConfirmed) return;

        // 🚧 POST /api/farm/orders/{id}/fulfill
        //    서버가 작물 차감 → 코인 지급 → 슬롯에 새 주문 교체.
        //    응답으로 갱신된 주문/코인/작물 받아서 반영하는 게 정석.
        myCrops[o.crop] -= o.need;

        // 더미: 슬롯에 새 주문 교체
        const pool = [
          { resident: '🐶 강아지', crop: '토마토', emoji: '🍅', need: 6, reward: 150 },
          { resident: '🐹 햄스터', crop: '딸기', emoji: '🍓', need: 2, reward: 110 },
          { resident: '🦊 여우', crop: '당근', emoji: '🥕', need: 4, reward: 130 },
        ];
        const fresh = pool[Math.floor(Math.random() * pool.length)];
        o.resident = fresh.resident; o.crop = fresh.crop;
        o.emoji = fresh.emoji; o.need = fresh.need; o.reward = fresh.reward;

        render();
        Swal.fire({
          html: `주문 완료! 🪙 <b>${o.reward}</b> 획득`, icon: "success",
          buttonsStyling: false, confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        });
      });
    }
  </script>
</body>

</html>
