<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('주민 주문')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('주민 주문')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 안내 -->
        <div class="card shadow-sm border-0" style="background:#F1FAFF;">
          <div class="card-body py-3">
            <span class="fs-7 text-gray-700">
              🧺 주민들이 작물을 원해요. 보유 작물로 주문을 이행하면 코인을 받아요!
            </span>
          </div>
        </div>

        <!-- 주문 슬롯 목록 -->
        <div id="orderContainer" class="d-flex flex-column gap-2"></div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('farm')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // ✅ 서버 권위. 작물·코인 차감·새 주문 교체 전부 서버가 처리.
    //    프론트는 GET /api/orders 로 받아 그리고, 이행 성공 시 다시 받아온다.
    const EMOJI = { radish: '🥗', tomato: '🍅', corn: '🌽', pumpkin: '🎃', carrot: '🥕', strawberry: '🍓' };
    function emojiOf(code) { return EMOJI[code] || '🌱'; }

    let orders = [];

    document.addEventListener('DOMContentLoaded', function () {
      loadOrders();
    });

    async function loadOrders() {
      try {
        const res = await fetch('/api/orders', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('주문을 불러오지 못했어요.');
        const body = await res.json();
        orders = (body.data ?? body) || [];
        render();
      } catch (e) {
        warn(e.message || '주문을 불러오지 못했어요.');
      }
    }

    function render() {
      const box = document.getElementById('orderContainer');
      box.innerHTML = '';

      orders.filter(o => o.state === 'OPEN').forEach(o => {
        // 요구 작물(현재 규칙은 1종, 구조는 여러 종 대응)
        const itemsText = (o.items || []).map(it =>
          `${it.cropName} <b>${it.need}</b>개 <span class="text-gray-400">(보유 ${it.have})</span>`
        ).join(', ');
        const firstCode = o.items && o.items[0] ? o.items[0].code : null;
        const canFulfill = o.canFulfill;

        const card = document.createElement('div');
        card.className = 'card shadow-sm';
        card.innerHTML = `
            <div class="card-body py-3">
                <div class="d-flex align-items-center gap-3">
                    <div style="font-size:32px;">${emojiOf(firstCode)}</div>
                    <div class="flex-grow-1">
                        <div class="fw-bold fs-6 text-gray-800">${o.villager}</div>
                        <div class="fs-7 text-gray-600 mt-1">${itemsText}</div>
                        <div class="fs-8 text-warning fw-semibold mt-1">🪙 보상 ${o.reward}</div>
                    </div>
                    <button class="btn btn-sm ${canFulfill ? 'btn-primary' : 'btn-light text-gray-400'}"
                            ${canFulfill ? '' : 'disabled'}
                            onclick="fulfillOrder(${o.orderId})">
                        ${canFulfill ? '이행' : '작물 부족'}
                    </button>
                </div>
            </div>
        `;
        box.appendChild(card);
      });
    }

    async function fulfillOrder(orderId) {
      const o = orders.find(x => x.orderId === orderId);
      if (!o) return;
      if (!o.canFulfill) return warn('작물이 부족해요!');

      const itemsText = (o.items || []).map(it => `${it.cropName} ${it.need}개`).join(', ');
      const result = await Swal.fire({
        html: `${o.villager}에게 ${itemsText}를 주고<br><b class="text-warning">🪙 ${o.reward}</b> 받을까요?`,
        icon: 'question', buttonsStyling: false, showCancelButton: true,
        confirmButtonText: '이행', cancelButtonText: '취소',
        customClass: { confirmButton: 'btn btn-primary', cancelButton: 'btn btn-light' }
      });
      if (!result.isConfirmed) return;

      try {
        const res = await fetch(`/api/orders/${orderId}/fulfill`, {
          method: 'POST', headers: { 'Accept': 'application/json' }
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok || body.result === false) {
          throw new Error(body.message || '이행에 실패했어요.');
        }

        const reward = o.reward;
        await loadOrders();   // 서버 최신 상태(새 주문 교체 포함) 다시 로드
        Swal.fire({
          html: `주문 완료! 🪙 <b>${reward}</b> 획득`, icon: 'success',
          buttonsStyling: false, confirmButtonText: '확인',
          customClass: { confirmButton: 'btn btn-primary' }
        });
      } catch (e) {
        warn(e.message);
      }
    }

    function warn(msg) {
      Swal.fire({
        text: msg, icon: 'warning', buttonsStyling: false,
        confirmButtonText: '확인', customClass: { confirmButton: 'btn btn-primary' }
      });
    }

  </script>
</body>

</html>
