<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('통계')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-main}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-4">

        <h2 class="fw-bolder fs-3 text-gray-900 mb-0">📊 통계</h2>

        <!-- 요약 카드 -->
        <div class="row g-3">
          <div class="col-4">
            <div class="card shadow-sm h-100">
              <div class="card-body text-center py-3">
                <div class="fw-bolder fs-2 text-primary" id="totalDone">0</div>
                <div class="fs-9 text-gray-500">완료한 할일</div>
              </div>
            </div>
          </div>
          <div class="col-4">
            <div class="card shadow-sm h-100">
              <div class="card-body text-center py-3">
                <div class="fw-bolder fs-2 text-success" id="completionRate">0%</div>
                <div class="fs-9 text-gray-500">완료율</div>
              </div>
            </div>
          </div>
          <div class="col-4">
            <div class="card shadow-sm h-100">
              <div class="card-body text-center py-3">
                <div class="fw-bolder fs-2 text-warning" id="currentLevel">Lv.1</div>
                <div class="fs-9 text-gray-500">현재 레벨</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 카테고리별 완료율 -->
        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">🏷️ 카테고리별 완료율</h3>
          </div>
          <div class="card-body">
            <div id="categoryChart"></div>
          </div>
        </div>

        <!-- 기간별 완료 추이 -->
        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">📅 최근 7일 완료 추이</h3>
          </div>
          <div class="card-body">
            <div id="weeklyChart"></div>
          </div>
        </div>

        <!-- XP 성장 추이 -->
        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">⭐ 경험치 성장</h3>
          </div>
          <div class="card-body">
            <div id="xpChart"></div>
          </div>
        </div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('stats')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    const stats = {
      totalDone: 0,
      completionRate: 0,
      currentLevel: 1,
      categories: [],
      weekly: { labels: [], data: [] },
      xp: { labels: [], data: [] }
    };

    document.addEventListener('DOMContentLoaded', async function () {
      await loadStats();
      document.getElementById('totalDone').textContent = stats.totalDone;
      document.getElementById('completionRate').textContent = stats.completionRate + '%';
      document.getElementById('currentLevel').textContent = 'Lv.' + stats.currentLevel;
      renderCharts();
    });

    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const body = await response.json();

        if (!body.result) {
          console.warn(body.message);
          return;
        }

        const dashboard = body.data;
        const summary = dashboard.summary || {};
        const categories = dashboard.categories || [];
        const weekly = dashboard.weekly || [];
        const expGrowth = dashboard.expGrowth || [];

        stats.totalDone = summary.totalDone || 0;
        stats.completionRate = summary.completionRate || 0;
        stats.currentLevel = summary.currentLevel || 1;
        stats.categories = categories.length > 0
          ? categories.map(category => ({
              name: category.categoryName,
              rate: category.completionRate,
              color: category.color || '#cccccc'
            }))
          : [
              { name: '건강', rate: 0, color: '#1BC5BD' },
              { name: '공부', rate: 0, color: '#3699FF' },
              { name: '집안일', rate: 0, color: '#FFA800' }
            ];
        stats.weekly = {
          labels: weekly.map(item => item.label),
          data: weekly.map(item => item.doneCount)
        };
        stats.xp = {
          labels: expGrowth.map(item => item.label),
          data: expGrowth.map(item => item.amount)
        };
      } catch (error) {
        console.error('통계 데이터를 불러오지 못했습니다.', error);
      }
    }

    function renderCharts() {
      // ApexCharts는 Metronic plugins.bundle.js에 포함됨
      if (typeof ApexCharts === 'undefined') {
        console.warn('ApexCharts 없음 — plugins.bundle.js 확인');
        return;
      }

      // 1) 카테고리별 완료율 (가로 막대)
      new ApexCharts(document.getElementById('categoryChart'), {
        series: [{
          name: '완료율',
          data: stats.categories.map(c => ({ x: c.name, y: c.rate }))
        }],
        chart: { type: 'bar', height: 200, toolbar: { show: false } },
        plotOptions: { bar: { horizontal: true, borderRadius: 6, distributed: true } },
        colors: stats.categories.map(c => c.color),
        xaxis: { min: 0, max: 100, tickAmount: 10 },
        yaxis: { labels: { show: true } },
        dataLabels: { enabled: true, formatter: v => v + '%' },
        legend: { show: false }
      }).render();

      // 2) 주간 완료 추이 (세로 막대)
      new ApexCharts(document.getElementById('weeklyChart'), {
        series: [{ name: '완료', data: stats.weekly.data }],
        chart: { type: 'bar', height: 200, toolbar: { show: false } },
        plotOptions: { bar: { borderRadius: 6, columnWidth: '50%' } },
        colors: ['#3699FF'],
        xaxis: { categories: stats.weekly.labels },
        yaxis: { min: 0, max: 7, tickAmount: 1 },
        dataLabels: { enabled: false }
      }).render();

      // 3) XP 성장 (라인)
      new ApexCharts(document.getElementById('xpChart'), {
        series: [{ name: 'XP', data: stats.xp.data }],
        chart: { type: 'area', height: 200, toolbar: { show: false } },
        colors: ['#FFA800'],
        stroke: { curve: 'smooth', width: 3 },
        fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.1 } },
        xaxis: { categories: stats.xp.labels },
        yaxis: { min: 100, max: 900, tickAmount: 4 },
        dataLabels: { enabled: false }
      }).render();
    }
  </script>
</body>

</html>
