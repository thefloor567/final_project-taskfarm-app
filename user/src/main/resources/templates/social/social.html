<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('소셜')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('소셜')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 상단 탭: 랭킹 / 친구  + 업적 바로가기 -->
        <div class="d-flex align-items-center gap-2">
          <ul class="nav nav-pills nav-fill gap-2 flex-grow-1">
            <li class="nav-item">
              <a class="nav-link active" id="tab-rank" onclick="switchMain('rank')">🏆 랭킹</a>
            </li>
            <li class="nav-item">
              <a class="nav-link position-relative" id="tab-friend" onclick="switchMain('friend')">
                👥 친구
                <span id="friendPendingBadge"
                      class="badge badge-circle badge-danger position-absolute d-none"
                      style="top:2px; right:6px; font-size:9px; min-width:16px; height:16px; padding:0 4px;">0</span>
              </a>
            </li>
          </ul>
          <a href="/achievements" class="btn btn-sm btn-icon btn-light-primary" title="업적 · 칭호">
            🏅
          </a>
        </div>

        <!-- ============ 랭킹 패널 ============ -->
        <div id="panel-rank">
          <ul class="nav nav-tabs nav-line-tabs fs-7 mb-3">
            <li class="nav-item"><a class="nav-link active" id="rk-total"  onclick="switchRankType('total')">누적</a></li>
            <li class="nav-item"><a class="nav-link"        id="rk-weekly" onclick="switchRankType('weekly')">주간</a></li>
          </ul>

          <div class="btn-group w-100 mb-3" role="group">
            <button class="btn btn-sm btn-light-primary active" id="sc-all"    onclick="switchScope('all')">전체</button>
            <button class="btn btn-sm btn-light"               id="sc-friend" onclick="switchScope('friend')">친구</button>
          </div>

          <div id="myRankCard" class="card shadow-sm border border-primary mb-3 d-none">
            <div class="card-body py-3 d-flex align-items-center gap-3">
              <div class="fw-bolder fs-2 text-primary" id="myRankNo">-</div>
              <div class="flex-grow-1">
                <div class="fw-bold fs-6 text-gray-900" id="myRankName">나</div>
                <div class="fs-8 text-gray-500"><span id="myRankExp">0</span> XP</div>
              </div>
              <span class="badge badge-light-primary">내 순위</span>
            </div>
          </div>

          <div id="rankList" class="d-flex flex-column gap-2"></div>
        </div>

        <!-- ============ 친구 패널 ============ -->
        <div id="panel-friend" class="d-none">
          <div class="card shadow-sm mb-3">
            <div class="card-body py-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fs-8 text-gray-500">내 친구코드</span>
                <span class="badge badge-light-secondary fs-7" id="myFriendCode">------</span>
              </div>
              <div class="input-group input-group-sm">
                <input type="text" id="friendCodeInput" class="form-control"
                       placeholder="친구코드 입력 (예: AB12-CD34)" maxlength="12">
                <button class="btn btn-primary" onclick="sendFriendRequest()">신청</button>
              </div>
            </div>
          </div>

          <div id="friendPendingWrap" class="mb-3 d-none">
            <h4 class="fw-bold fs-6 text-gray-800 mb-2">받은 신청</h4>
            <div id="friendPendingList" class="d-flex flex-column gap-2"></div>
          </div>

          <h4 class="fw-bold fs-6 text-gray-800 mb-2">내 친구 <span id="friendCount" class="text-gray-400 fs-8">0</span></h4>
          <div id="friendList" class="d-flex flex-column gap-2"></div>

          <div id="friendSentWrap" class="mt-3 d-none">
            <h4 class="fw-bold fs-6 text-gray-500 mb-2">보낸 신청 (대기중)</h4>
            <div id="friendSentList" class="d-flex flex-column gap-2"></div>
          </div>
        </div>

      </div>
    </div>

    <div th:replace="~{fragments/navbar :: navbar-main('')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    let rankType = 'total';
    let rankScope = 'all';

    document.addEventListener('DOMContentLoaded', function () {
      loadRank();
      loadFriends();
    });

    function switchMain(which) {
      const isRank = which === 'rank';
      document.getElementById('panel-rank').classList.toggle('d-none', !isRank);
      document.getElementById('panel-friend').classList.toggle('d-none', isRank);
      document.getElementById('tab-rank').classList.toggle('active', isRank);
      document.getElementById('tab-friend').classList.toggle('active', !isRank);
      if (!isRank) loadFriends();
    }

    function switchRankType(t) {
      rankType = t;
      document.getElementById('rk-total').classList.toggle('active', t === 'total');
      document.getElementById('rk-weekly').classList.toggle('active', t === 'weekly');
      loadRank();
    }

    function switchScope(s) {
      rankScope = s;
      document.getElementById('sc-all').classList.toggle('active', s === 'all');
      document.getElementById('sc-all').classList.toggle('btn-light-primary', s === 'all');
      document.getElementById('sc-all').classList.toggle('btn-light', s !== 'all');
      document.getElementById('sc-friend').classList.toggle('active', s === 'friend');
      document.getElementById('sc-friend').classList.toggle('btn-light-primary', s === 'friend');
      document.getElementById('sc-friend').classList.toggle('btn-light', s !== 'friend');
      loadRank();
    }

    async function loadRank() {
      const listBox = document.getElementById('rankList');
      listBox.innerHTML = '<div class="text-center text-gray-400 py-4">불러오는 중…</div>';
      try {
        const res = await fetch(`/api/rank?type=${rankType}&scope=${rankScope}`,
          { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('랭킹을 불러오지 못했어요.');
        const data = (await res.json()).data ?? {};
        renderRank(data.top || [], data.me || null);
      } catch (e) {
        listBox.innerHTML = `<div class="text-center text-danger py-4 fs-8">${e.message}</div>`;
      }
    }

    function medal(rank) {
      return rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `<span class="fw-bold text-gray-500">${rank}</span>`;
    }

    function renderRank(top, me) {
      const myCard = document.getElementById('myRankCard');
      if (me) {
        document.getElementById('myRankNo').textContent = me.rank ?? '-';
        document.getElementById('myRankName').textContent = me.nickname ?? '나';
        document.getElementById('myRankExp').textContent = (me.exp ?? 0).toLocaleString();
        myCard.classList.remove('d-none');
      } else {
        myCard.classList.add('d-none');
      }

      const box = document.getElementById('rankList');
      box.innerHTML = '';
      if (!top.length) {
        box.innerHTML = '<div class="text-center text-gray-400 py-4 fs-8">아직 랭킹이 없어요.</div>';
        return;
      }
      top.forEach(r => {
        const card = document.createElement('div');
        card.className = 'card shadow-sm';
        card.innerHTML = `
          <div class="card-body py-2 d-flex align-items-center gap-3">
            <div style="width:28px;text-align:center;font-size:18px;">${medal(r.rank)}</div>
            <div class="flex-grow-1">
              <div class="fw-semibold fs-7 text-gray-900">
                ${r.title ? `<span class="me-1">${r.title}</span>` : ''}${r.nickname}
              </div>
            </div>
            <div class="fw-bold fs-7 text-gray-700">${(r.exp ?? 0).toLocaleString()} XP</div>
          </div>`;
        box.appendChild(card);
      });
    }

    async function loadFriends() {
      try {
        const res = await fetch('/api/friends', { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error();
        const d = (await res.json()).data ?? {};
        renderFriends(d);
      } catch (e) {
        document.getElementById('friendList').innerHTML =
          '<div class="text-center text-danger py-4 fs-8">친구 정보를 불러오지 못했어요.</div>';
      }
    }

    function renderFriends(d) {
      document.getElementById('myFriendCode').textContent = d.myCode || '------';

      const pc = d.pendingCount ?? (d.received || []).length;
      const tabBadge = document.getElementById('friendPendingBadge');
      if (pc > 0) {
        tabBadge.textContent = pc;
        tabBadge.classList.remove('d-none');
      } else {
        tabBadge.classList.add('d-none');
      }

      const recv = d.received || [];
      const recvWrap = document.getElementById('friendPendingWrap');
      const recvBox = document.getElementById('friendPendingList');
      recvWrap.classList.toggle('d-none', recv.length === 0);
      recvBox.innerHTML = recv.map(f => `
        <div class="card shadow-sm"><div class="card-body py-2 d-flex align-items-center gap-2">
          <div class="flex-grow-1 fw-semibold fs-7 text-gray-900">${f.nickname}</div>
          <button class="btn btn-sm btn-primary" onclick="acceptFriend(${f.id})">수락</button>
          <button class="btn btn-sm btn-light" onclick="rejectFriend(${f.id})">거절</button>
        </div></div>`).join('');

      const friends = d.friends || [];
      document.getElementById('friendCount').textContent = `${friends.length}/100`;
      document.getElementById('friendList').innerHTML = friends.length ? friends.map(f => `
        <div class="card shadow-sm"><div class="card-body py-2 d-flex align-items-center gap-2">
          <div class="flex-grow-1">
            <div class="fw-semibold fs-7 text-gray-900">${f.title ? f.title + ' ' : ''}${f.nickname}</div>
            <div class="fs-9 text-gray-500">Lv ${f.level ?? '-'}${f.rank ? ` · ${f.rank}위` : ''}</div>
          </div>
          <button class="btn btn-sm btn-icon btn-light" onclick="deleteFriend(${f.id}, '${f.nickname}')">
            <i class="ki-duotone ki-trash fs-5"><span class="path1"></span><span class="path2"></span><span class="path3"></span><span class="path4"></span><span class="path5"></span></i>
          </button>
        </div></div>`).join('')
        : '<div class="text-center text-gray-400 py-4 fs-8">아직 친구가 없어요. 친구코드로 추가해보세요!</div>';

      const sent = d.sent || [];
      const sentWrap = document.getElementById('friendSentWrap');
      sentWrap.classList.toggle('d-none', sent.length === 0);
      document.getElementById('friendSentList').innerHTML = sent.map(f => `
        <div class="card shadow-sm"><div class="card-body py-2 d-flex align-items-center gap-2">
          <div class="flex-grow-1 fw-semibold fs-7 text-gray-600">${f.nickname}</div>
          <span class="badge badge-light-secondary">대기중</span>
          <button class="btn btn-sm btn-light-danger" onclick="cancelFriendRequest(${f.id}, '${f.nickname}')">취소</button>
        </div></div>`).join('');
    }

    async function sendFriendRequest() {
      const code = document.getElementById('friendCodeInput').value.trim();
      if (!code) return warn('친구코드를 입력해주세요.');
      const ok = await postFriend('/api/friends/request', { code });
      if (ok) {
        document.getElementById('friendCodeInput').value = '';
        toast('친구 신청을 보냈어요!');
        loadFriends();
      }
    }

    async function acceptFriend(id) {
      if (await postFriend(`/api/friends/${id}/accept`)) {
        toast('친구가 되었어요! 🎉');
        loadFriends();
      }
    }

    async function rejectFriend(id) {
      if (await postFriend(`/api/friends/${id}/reject`)) {
        loadFriends();
      }
    }

    async function cancelFriendRequest(id, name) {
      const c = await Swal.fire({
        text: `${name}님에게 보낸 친구 신청을 취소할까요?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '취소하기',
        cancelButtonText: '그대로 두기',
        buttonsStyling: false,
        customClass: {
          confirmButton: 'btn btn-danger',
          cancelButton: 'btn btn-light'
        }
      });

      if (!c.isConfirmed) return;

      const res = await fetch(`/api/friends/${id}`, {
        method: 'DELETE',
        headers: { 'Accept': 'application/json' }
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || data.result === false) {
        warn(data.message || '친구 신청 취소에 실패했어요.');
        return;
      }

      toast('친구 신청을 취소했어요.');
      loadFriends();
    }

    async function deleteFriend(id, name) {
      const c = await Swal.fire({
        text: `${name}님을 친구에서 삭제할까요?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '삭제',
        cancelButtonText: '취소',
        buttonsStyling: false,
        customClass: {
          confirmButton: 'btn btn-danger',
          cancelButton: 'btn btn-light'
        }
      });

      if (!c.isConfirmed) return;

      const res = await fetch(`/api/friends/${id}`, {
        method: 'DELETE',
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        loadFriends();
      } else {
        warn('삭제에 실패했어요.');
      }
    }

    async function postFriend(url, body = null) {
      try {
        const opt = { method: 'POST', headers: { 'Accept': 'application/json' } };
        if (body) {
          opt.headers['Content-Type'] = 'application/json';
          opt.body = JSON.stringify(body);
        }
        const res = await fetch(url, opt);
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.result === false) throw new Error(data.message || '요청에 실패했어요.');
        return true;
      } catch (e) {
        warn(e.message);
        return false;
      }
    }

    function warn(msg) {
      Swal.fire({
        text: msg,
        icon: 'warning',
        buttonsStyling: false,
        confirmButtonText: '확인',
        customClass: { confirmButton: 'btn btn-primary' }
      });
    }

    function toast(msg) {
      Swal.fire({
        text: msg,
        icon: 'success',
        timer: 1400,
        showConfirmButton: false
      });
    }
  </script>
</body>

</html>
