<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('할일')}"></head>

<body>
  <div class="app-shell" style="position: relative;">

    <div th:replace="~{fragments/header :: header-main}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-3">

        <!-- 상단: 제목 + 날짜 -->
        <div class="d-flex justify-content-between align-items-center">
          <h2 class="fw-bolder fs-3 text-gray-900 mb-0">할일</h2>
          <span class="fs-7 text-gray-500" id="todayLabel"></span>
        </div>

        <!-- 상태 필터 탭 -->
        <div class="d-flex gap-2" id="statusFilter">
          <button
            type="button"
            class="btn btn-sm btn-primary flex-fill filter-btn"
            data-status="ALL"
            onclick="selectStatus(this)"
          >
            전체
          </button>

          <button
            type="button"
            class="btn btn-sm btn-light flex-fill filter-btn"
            data-status="TODO"
            onclick="selectStatus(this)"
          >
            진행중
          </button>

          <button
            type="button"
            class="btn btn-sm btn-light flex-fill filter-btn"
            data-status="DONE"
            onclick="selectStatus(this)"
          >
            완료
          </button>
        </div>

        <!-- 카테고리 필터 -->
        <div
          class="d-flex gap-2 overflow-auto pb-1"
          id="categoryFilter"
          style="white-space: nowrap;"
        >
          <button
            type="button"
            class="btn btn-sm btn-light-primary cat-chip active-cat"
            data-cat="ALL"
            onclick="selectCategory(this)"
          >
            전체
          </button>
        </div>

        <!-- 할일 없을 때 -->
        <div
          id="emptyState"
          class="d-flex flex-column align-items-center justify-content-center gap-3 py-20 d-none"
        >
          <span style="font-size: 48px;">📝</span>
          <span class="fs-5 fw-semibold text-gray-500">할일이 없어요</span>
          <span class="fs-7 text-gray-400">오른쪽 아래 버튼으로 할일을 추가해보세요!</span>
        </div>

        <!-- 할일 카드 목록 -->
        <div id="todoContainer" class="d-flex flex-column gap-2"></div>

      </div>
    </div>

    <!-- 추가 버튼 -->
    <div th:replace="~{fragments/navbar :: btn-add('/todo/add')}"></div>

    <div th:replace="~{fragments/navbar :: navbar-main('todo')}"></div>

  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>

  <script>
    let currentStatus = 'ALL';
    let currentCat = 'ALL';

    let todos = [];
    let categories = [];

    document.addEventListener('DOMContentLoaded', function () {
      const today = new Date();

      document.getElementById('todayLabel').textContent =
        `${today.getMonth() + 1}월 ${today.getDate()}일`;

      loadCategories();
      loadTodos();
    });

    function priorityBadge(priority) {
      const map = {
        A: 'badge-light-danger',
        B: 'badge-light-warning',
        C: 'badge-light-secondary'
      };

      return `
        <span class="badge badge-sm ${map[priority] || 'badge-light-secondary'}">
          우선순위 ${priority}
        </span>
      `;
    }

    async function loadCategories() {
      try {
        const res = await fetch('/api/category');
        const body = await res.json();

        categories = body.data || body || [];
        renderCategoryChips(categories);

      } catch (e) {
        console.error('카테고리 조회 실패', e);

        categories = [];
        renderCategoryChips(categories);
      }
    }

    async function loadTodos() {
      try {
        const params = new URLSearchParams();

        if (currentStatus === 'TODO') {
          params.set('isDone', 'false');
        }

        if (currentStatus === 'DONE') {
          params.set('isDone', 'true');
        }

        const queryString = params.toString();
        const url = queryString ? `/api/todos?${queryString}` : '/api/todos';

        const res = await fetch(url);
        const body = await res.json();

        todos = body.data || [];
        renderTodos();

      } catch (e) {
        console.error('할일 목록 조회 실패', e);

        todos = [];
        renderTodos();
      }
    }

    function renderCategoryChips(cats) {
      const box = document.getElementById('categoryFilter');

      box.querySelectorAll('.cat-chip:not([data-cat="ALL"])').forEach(el => {
        el.remove();
      });

      cats.forEach(category => {
        const btn = document.createElement('button');

        btn.type = 'button';
        btn.className = 'btn btn-sm btn-light cat-chip';
        btn.dataset.cat = category.name;
        btn.textContent = category.name;
        btn.onclick = () => selectCategory(btn);

        box.appendChild(btn);
      });
    }

    function renderTodos() {
      const container = document.getElementById('todoContainer');
      const empty = document.getElementById('emptyState');

      container.innerHTML = '';

      const list = todos.filter(todo => {
        return currentCat === 'ALL' || todo.categoryName === currentCat;
      });

      if (list.length === 0) {
        empty.classList.remove('d-none');
        return;
      }

      empty.classList.add('d-none');

      list.forEach(todo => {
        const card = document.createElement('div');

        card.className = 'card shadow-sm';
        card.style.cursor = 'pointer';

        card.onclick = event => {
          if (event.target.closest('.todo-check')) {
            return;
          }

          location.href = `/todo/detail/${todo.idxTodo}`;
        };

        card.innerHTML = `
          <div class="card-body py-3">
            <div class="d-flex align-items-center gap-3">

              <div class="form-check todo-check" onclick="event.stopPropagation();">
                <input
                  class="form-check-input"
                  type="checkbox"
                  ${todo.done ? 'checked' : ''}
                  onchange="toggleComplete(${todo.idxTodo}, this.checked)"
                >
              </div>

              <div class="flex-grow-1">
                <div class="d-flex align-items-center gap-2 mb-1">
                  <span class="badge badge-sm badge-light-primary">
                    ${todo.categoryName || '미분류'}
                  </span>

                  ${priorityBadge(todo.priority)}

                  <span class="badge badge-sm badge-light-success">
                    ${todo.rewardExp ?? 0} XP
                  </span>
                </div>

                <span class="fw-bold fs-6 text-gray-800 ${todo.done ? 'text-decoration-line-through text-gray-400' : ''}">
                  ${todo.title}
                </span>

                <div class="fs-8 text-gray-400 mt-1">
                  📅 ${formatDate(todo.dueDate)}
                </div>
              </div>

              <i class="ki-duotone ki-arrow-right fs-3 text-gray-300">
                <span class="path1"></span>
                <span class="path2"></span>
              </i>

            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function selectStatus(btn) {
      document.querySelectorAll('#statusFilter .filter-btn').forEach(button => {
        button.classList.remove('btn-primary');
        button.classList.add('btn-light');
      });

      btn.classList.remove('btn-light');
      btn.classList.add('btn-primary');

      currentStatus = btn.dataset.status;
      loadTodos();
    }

    function selectCategory(btn) {
      document.querySelectorAll('#categoryFilter .cat-chip').forEach(button => {
        button.classList.remove('btn-light-primary', 'active-cat');
        button.classList.add('btn-light');
      });

      btn.classList.remove('btn-light');
      btn.classList.add('btn-light-primary', 'active-cat');

      currentCat = btn.dataset.cat;
      renderTodos();
    }

    async function toggleComplete(todoId, checked) {
      try {
        const url = checked
          ? `/api/todos/${todoId}/complete`
          : `/api/todos/${todoId}/incomplete`;

        const res = await fetch(url, {
          method: 'PATCH'
        });

        const body = await res.json();

        if (!res.ok || body.result === false) {
          throw new Error(body.message || '완료 상태 변경 실패');
        }

        await loadTodos();

      } catch (e) {
        console.error('완료 상태 변경 실패', e);
        await loadTodos();
      }
    }

    function formatDate(value) {
      if (!value) {
        return '-';
      }

      return value.substring(0, 10);
    }
  </script>
</body>

</html>
