<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('할일 작성')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('할일 작성')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-4">

        <div class="card shadow-sm">
          <div class="card-body">
            <label class="form-label fw-semibold text-gray-700">할일</label>
            <input type="text" id="title" class="form-control form-control-lg" placeholder="무엇을 할까요?">
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">카테고리</h3>
            <div class="card-toolbar">
              <a href="/category" class="btn btn-sm btn-light">관리</a>
            </div>
          </div>
          <div class="card-body">
            <div class="d-flex gap-2 flex-wrap" id="categoryBox"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">우선순위</h3>
          </div>
          <div class="card-body d-flex gap-2">
            <button type="button" class="btn btn-light-danger flex-fill prio-btn" data-prio="A"
              onclick="selectPrio(this)">A · 급함</button>
            <button type="button" class="btn btn-light-warning flex-fill prio-btn active-prio" data-prio="B"
              onclick="selectPrio(this)">B · 보통</button>
            <button type="button" class="btn btn-light-secondary flex-fill prio-btn" data-prio="C"
              onclick="selectPrio(this)">C · 여유</button>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">마감일</h3>
          </div>
          <div class="card-body">
            <input type="date" id="dueDate" class="form-control">
          </div>
        </div>

        <button type="button" class="btn btn-primary btn-lg w-100" onclick="handleSave()">
          저장하기
        </button>

      </div>
    </div>

  </div>

  <style>
    .active-prio {
      box-shadow: inset 0 0 0 2px currentColor;
      font-weight: 700;
    }
  </style>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    let selectedCategory = null;
    let selectedPriority = 'B';

    const dummyCats = [
      { categoryId: 1, name: '건강', color: '#1BC5BD' },
      { categoryId: 2, name: '공부', color: '#3699FF' },
      { categoryId: 3, name: '집안일', color: '#FFA800' },
    ];

    document.addEventListener('DOMContentLoaded', function () {
      renderCategories(dummyCats);
      document.getElementById('dueDate').valueAsDate = new Date();
    });

    function renderCategories(cats) {
      const box = document.getElementById('categoryBox');
      box.innerHTML = '';
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm btn-light cat-select';
        btn.dataset.id = c.categoryId;
        btn.style.border = '1.5px solid transparent';
        btn.innerHTML = `<span style="color:${c.color};">●</span> ${c.name}`;
        btn.onclick = () => selectCategory(btn, c);
        box.appendChild(btn);
      });
    }

    function selectCategory(btn, cat) {
      document.querySelectorAll('.cat-select').forEach(b => {
        b.classList.remove('btn-light-primary');
        b.classList.add('btn-light');
        b.style.borderColor = 'transparent';
      });
      btn.classList.remove('btn-light');
      btn.classList.add('btn-light-primary');
      btn.style.borderColor = cat.color;
      selectedCategory = cat.categoryId;
    }

    function selectPrio(btn) {
      document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active-prio'));
      btn.classList.add('active-prio');
      selectedPriority = btn.dataset.prio;
    }

    function handleSave() {
      const title = document.getElementById('title').value.trim();
      const dueDate = document.getElementById('dueDate').value;

      if (!title) {
        return Swal.fire({
          text: "할일을 입력해주세요.", icon: "warning",
          buttonsStyling: false, confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        });
      }

      const data = {
        title,
        categoryId: selectedCategory,
        priority: selectedPriority,
        dueDate: dueDate || null
      };
      console.log('저장할 데이터:', data);

      Swal.fire({
        text: "할일이 추가되었습니다!", icon: "success",
        buttonsStyling: false, confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-primary" }
      }).then(() => location.href = '/todo/list');
    }
  </script>
</body>

</html>
