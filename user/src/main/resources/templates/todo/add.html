<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('할일 작성')}"></head>

<body>
  <div class="app-shell">

    <div th:replace="~{fragments/header :: header-back('할일 작성')}"></div>

    <div id="scrollContainer">
      <div class="p-4 d-flex flex-column gap-4">

        <!-- 할일 제목 -->
        <div class="card shadow-sm">
          <div class="card-body">
            <label class="form-label fw-semibold text-gray-700">할일</label>
            <input
              type="text"
              id="title"
              class="form-control form-control-lg"
              placeholder="무엇을 할까요?"
            >
          </div>
        </div>

        <!-- 내용 -->
        <div class="card shadow-sm">
          <div class="card-body">
            <label class="form-label fw-semibold text-gray-700">내용</label>
            <textarea
              id="content"
              class="form-control"
              rows="4"
              placeholder="상세 내용을 입력하세요."
            ></textarea>
          </div>
        </div>

        <!-- 카테고리 -->
        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">카테고리</h3>
            <div class="card-toolbar">
              <a href="/category" class="btn btn-sm btn-light">관리</a>
            </div>
          </div>
          <div class="card-body">
            <div class="d-flex gap-2 flex-wrap" id="categoryBox"></div>
          </div>
        </div>

        <!-- 우선순위 -->
        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">우선순위</h3>
          </div>
          <div class="card-body d-flex gap-2">
            <button
              type="button"
              class="btn btn-light-danger flex-fill prio-btn"
              data-prio="A"
              onclick="selectPrio(this)"
            >
              A · 급함
            </button>

            <button
              type="button"
              class="btn btn-light-warning flex-fill prio-btn active-prio"
              data-prio="B"
              onclick="selectPrio(this)"
            >
              B · 보통
            </button>

            <button
              type="button"
              class="btn btn-light-secondary flex-fill prio-btn"
              data-prio="C"
              onclick="selectPrio(this)"
            >
              C · 여유
            </button>
          </div>
        </div>

        <!-- 마감일 -->
        <div class="card shadow-sm">
          <div class="card-header">
            <h3 class="card-title fs-6">마감일</h3>
          </div>
          <div class="card-body">
            <input type="date" id="dueDate" class="form-control">
          </div>
        </div>

        <button
          type="button"
          class="btn btn-primary btn-lg w-100"
          onclick="handleSave()"
        >
          저장하기
        </button>

      </div>
    </div>

  </div>

  <style>
    .active-prio {
      box-shadow: inset 0 0 0 2px currentColor;
      font-weight: 700;
    }
  </style>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>

  <script>
    const pathParts = location.pathname.split('/');
    const isEditMode = location.pathname.startsWith('/todo/edit/');
    const todoId = isEditMode ? pathParts[pathParts.length - 1] : null;

    let selectedCategory = null;
    let selectedPriority = 'B';

    document.addEventListener('DOMContentLoaded', function () {
      loadCategories();
      document.getElementById('dueDate').valueAsDate = new Date();

      if (isEditMode) {
        loadTodoForEdit();
        document.querySelector('button[onclick="handleSave()"]').textContent = '수정하기';
      }
    });

    async function loadCategories() {
      try {
        const res = await fetch('/api/category');
        const body = await res.json();

        const cats = body.data || body || [];
        renderCategories(cats);
      } catch (e) {
        console.error('카테고리 조회 실패', e);
        renderCategories([]);
      }
    }

    async function loadTodoForEdit() {
      try {
        const res = await fetch(`/api/todos/${todoId}`);
        const body = await res.json();

        if (!res.ok || body.result === false) {
          throw new Error(body.message || '할일 조회 실패');
        }

        const todo = body.data;

        document.getElementById('title').value = todo.title || '';
        document.getElementById('content').value = todo.content || '';
        document.getElementById('dueDate').value = todo.dueDate
          ? todo.dueDate.substring(0, 10)
          : '';

        selectedCategory = todo.idxCat;
        selectedPriority = todo.priority;

        document.querySelectorAll('.prio-btn').forEach(btn => {
          btn.classList.toggle('active-prio', btn.dataset.prio === selectedPriority);
        });

        renderCategoriesAfterCategoryLoaded();

      } catch (e) {
        Swal.fire({
          text: e.message,
          icon: "error",
          buttonsStyling: false,
          confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        }).then(() => location.href = '/todo/list');
      }
    }

    function renderCategories(cats) {
      const box = document.getElementById('categoryBox');
      box.innerHTML = '';

      cats.forEach(c => {
        const btn = document.createElement('button');

        btn.type = 'button';
        btn.className = 'btn btn-sm btn-light cat-select';
        btn.dataset.id = c.idxCat;
        btn.style.border = '1.5px solid transparent';
        btn.innerHTML = `<span style="color:${c.color};">●</span> ${c.name}`;
        btn.onclick = () => selectCategory(btn, c);

        if (selectedCategory !== null && Number(selectedCategory) === Number(c.idxCat)) {
          btn.classList.remove('btn-light');
          btn.classList.add('btn-light-primary');
          btn.style.borderColor = c.color;
        }

        box.appendChild(btn);
      });
    }

    function renderCategoriesAfterCategoryLoaded() {
      document.querySelectorAll('.cat-select').forEach(btn => {
        if (Number(btn.dataset.id) === Number(selectedCategory)) {
          btn.classList.remove('btn-light');
          btn.classList.add('btn-light-primary');
        }
      });
    }

    function selectCategory(btn, cat) {
      document.querySelectorAll('.cat-select').forEach(b => {
        b.classList.remove('btn-light-primary');
        b.classList.add('btn-light');
        b.style.borderColor = 'transparent';
      });

      btn.classList.remove('btn-light');
      btn.classList.add('btn-light-primary');
      btn.style.borderColor = cat.color;

      selectedCategory = cat.idxCat;
    }

    function selectPrio(btn) {
      document.querySelectorAll('.prio-btn').forEach(b => {
        b.classList.remove('active-prio');
      });

      btn.classList.add('active-prio');
      selectedPriority = btn.dataset.prio;
    }

    async function handleSave() {
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      const dueDate = document.getElementById('dueDate').value;

      if (!title) {
        return Swal.fire({
          text: "할일을 입력해주세요.",
          icon: "warning",
          buttonsStyling: false,
          confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        });
      }

      const data = {
        idxCat: selectedCategory,
        title: title,
        content: content || null,
        priority: selectedPriority,
        dueDate: dueDate ? dueDate + "T00:00:00" : null
      };

      try {
        const url = isEditMode ? `/api/todos/${todoId}` : '/api/todos';
        const method = isEditMode ? 'PATCH' : 'POST';

        const res = await fetch(url, {
          method: method,
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const body = await res.json();

        if (!res.ok || body.result === false) {
          throw new Error(body.message || '할일 저장 실패');
        }

        Swal.fire({
          text: isEditMode ? "할일이 수정되었습니다!" : "할일이 추가되었습니다!",
          icon: "success",
          buttonsStyling: false,
          confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        }).then(() => {
          location.href = isEditMode ? `/todo/detail/${todoId}` : '/todo/list';
        });

      } catch (e) {
        Swal.fire({
          text: e.message,
          icon: "error",
          buttonsStyling: false,
          confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        });
      }
    }
  </script>
</body>

</html>
