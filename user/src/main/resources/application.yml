server:
  port: 8080

spring:
  application:
    name: taskfarm-user
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local,worker}
    
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: false

  # ── DB (admin앱과 같은 RDS 공유) ──
  datasource:
    master:
      jdbc-url: jdbc:mysql://${DB_HOST:}:${DB_PORT:}/${DB_NAME:}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      username: ${DB_USERNAME:}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
    replica:
      # DB_REPLICA_HOST 가 있으면 그 호스트, 없으면 master 호스트로 폴백
      # → 로컬/인프라전엔 같은 DB, prod 에서 DB_REPLICA_HOST 주입하면 분리 (yml 변경 0)
      jdbc-url: jdbc:mysql://${DB_REPLICA_HOST:${DB_HOST:}}:${DB_PORT:}/${DB_NAME:}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      username: ${DB_USERNAME:}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
        
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-3.5-flash
          
#farm:
#  wither-minutes: 1440      # 운영 기본 24시간(=1440분)
  
farm:
  wither-minutes: 1440         # 2분 뒤 시듦 (시연/테스트용)
  

# Read replica 설정
datasource:
  routing:
    enabled: true 
