server:
  port: 8080

spring:
  application:
    name: taskfarm-user
    
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false

  # ── DB (admin앱과 같은 RDS 공유) ──
  datasource:
    master:
      jdbc-url: mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:taskfarm}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      username: ${DB_USERNAME:taskfarm}
      password: ${DB_PASSWORD:taskfarm1234}
      driver-class-name: com.mysql.cj.jdbc.Driver
    replica:
      # DB_REPLICA_HOST 가 있으면 그 호스트, 없으면 master 호스트로 폴백
      # → 로컬/인프라전엔 같은 DB, prod 에서 DB_REPLICA_HOST 주입하면 분리 (yml 변경 0)
      jdbc-url: jdbc:mysql://${DB_REPLICA_HOST:${DB_HOST:localhost}}:${DB_PORT:3306}/${DB_NAME:taskfarm}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      username: ${DB_USERNAME:taskfarm}
      password: ${DB_PASSWORD:taskfarm1234}
      driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

jwt:
  secret: ${JWT_SECRET:local-dev-secret-please-change-this-to-long-random-string}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
        
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
          
#farm:
#  wither-minutes: 1440      # 운영 기본 24시간(=1440분)
  
farm:
  wither-minutes: 2         # 2분 뒤 시듦 (시연/테스트용)
  

# Read replica 설정
datasource:
  routing:
    enabled: true 
