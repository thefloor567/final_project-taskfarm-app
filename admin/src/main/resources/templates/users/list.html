<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('유저 관리')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

    <div class="admin-content">

      <h1 class="fw-bolder fs-2 text-gray-900 mb-1">유저 관리</h1>
      <p class="text-gray-500 fs-6 mb-6">가입자 목록 및 활동 조회</p>

      <div class="card shadow-sm">
        <div class="card-header d-flex align-items-center justify-content-between">
          <h3 class="card-title fs-5">전체 유저 <span class="text-gray-400 fs-6" id="totalCount">(0)</span></h3>
          <div class="card-toolbar" style="width:280px;">
            <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="닉네임·이메일 검색"
              onkeyup="filterUsers()">
          </div>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-row-bordered align-middle gy-3">
              <thead>
                <tr class="fw-bold fs-7 text-gray-500 text-uppercase">
                  <th>유저</th>
                  <th class="text-center">상태</th>
                  <th class="text-center">레벨</th>
                  <th class="text-center">완료한 할일</th>
                  <th class="text-center">가입일</th>
                  <th class="text-center">관리</th>
                  <th class="text-center">상세</th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>

          <div id="emptyState" class="text-center py-10 d-none">
            <span class="fs-6 text-gray-400">검색 결과가 없어요</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    let users = [];

    document.addEventListener('DOMContentLoaded', function () {
      fetch('/admin/api/users')
        .then(res => res.json())
        .then(res => {
          users = res.data;
          render(users);
        })
        .catch(err => console.error(err));
    });

    function render(list) {
      const tbody = document.getElementById('userTableBody');
      const empty = document.getElementById('emptyState');
      document.getElementById('totalCount').textContent = `(${list.length})`;
      tbody.innerHTML = '';

      if (list.length === 0) {
        empty.classList.remove('d-none');
        return;
      }

      empty.classList.add('d-none');

      list.forEach(u => {
        const isSuspended = u.status === 'SUSPENDED';

        const statusBadge = isSuspended
          ? '<span class="badge badge-light-danger">정지</span>'
          : '<span class="badge badge-light-success">정상</span>';

        const actionButton = isSuspended
          ? `<button type="button" class="btn btn-sm btn-light-success" onclick="activateUser(${u.userId})">정지 해제</button>`
          : `<button type="button" class="btn btn-sm btn-light-danger" onclick="suspendUser(${u.userId})">정지</button>`;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center justify-content-center rounded-circle bg-light-primary"
                         style="width:40px;height:40px;font-size:18px;">🧑‍🌾</div>
                    <div>
                        <div class="fw-bold fs-6 text-gray-800">${u.nickname}</div>
                        <div class="fs-8 text-gray-500">${u.email}</div>
                    </div>
                </div>
            </td>
            <td class="text-center">${statusBadge}</td>
            <td class="text-center"><span class="badge badge-light-primary">Lv.${u.level}</span></td>
            <td class="text-center fw-semibold">${u.doneCount}</td>
            <td class="text-center fs-7 text-gray-600">${u.joinDate}</td>
            <td class="text-center">${actionButton}</td>
            <td class="text-center">
                <a href="/admin/users/${u.userId}" class="btn btn-sm btn-light-primary">보기</a>
            </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterUsers() {
      const kw = document.getElementById('searchInput').value.toLowerCase();
      const filtered = users.filter(u =>
        u.nickname.toLowerCase().includes(kw) || u.email.toLowerCase().includes(kw));
      render(filtered);
    }

    function suspendUser(userId) {
      Swal.fire({
        title: '유저를 정지하시겠습니까?',
        text: '정지된 유저는 로그인할 수 없습니다.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '정지',
        cancelButtonText: '취소',
        customClass: {
          confirmButton: 'btn btn-danger',
          cancelButton: 'btn btn-light'
        },
        buttonsStyling: false
      }).then((result) => {
        if (!result.isConfirmed) {
          return;
        }

        fetch(`/admin/api/users/${userId}/suspend`, {
          method: 'PATCH'
        })
          .then(res => res.json())
          .then(res => {
            if (!res.result) {
              Swal.fire({
                title: '실패',
                text: res.message || '유저 정지에 실패했습니다.',
                icon: 'error',
                confirmButtonText: '확인',
                customClass: {
                  confirmButton: 'btn btn-primary'
                },
                buttonsStyling: false
              });
              return;
            }

            Swal.fire({
              title: '완료',
              text: '유저가 정지되었습니다.',
              icon: 'success',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            }).then(() => {
              location.reload();
            });
          })
          .catch(err => {
            console.error(err);
            Swal.fire({
              title: '오류',
              text: '유저 정지 중 오류가 발생했습니다.',
              icon: 'error',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            });
          });
      });
    }

    function activateUser(userId) {
      Swal.fire({
        title: '정지를 해제하시겠습니까?',
        text: '해당 유저가 다시 로그인할 수 있습니다.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '정지 해제',
        cancelButtonText: '취소',
        customClass: {
          confirmButton: 'btn btn-success',
          cancelButton: 'btn btn-light'
        },
        buttonsStyling: false
      }).then((result) => {
        if (!result.isConfirmed) {
          return;
        }

        fetch(`/admin/api/users/${userId}/activate`, {
          method: 'PATCH'
        })
          .then(res => res.json())
          .then(res => {
            if (!res.result) {
              Swal.fire({
                title: '실패',
                text: res.message || '유저 정지 해제에 실패했습니다.',
                icon: 'error',
                confirmButtonText: '확인',
                customClass: {
                  confirmButton: 'btn btn-primary'
                },
                buttonsStyling: false
              });
              return;
            }

            Swal.fire({
              title: '완료',
              text: '유저 정지가 해제되었습니다.',
              icon: 'success',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            }).then(() => {
              location.reload();
            });
          })
          .catch(err => {
            console.error(err);
            Swal.fire({
              title: '오류',
              text: '유저 정지 해제 중 오류가 발생했습니다.',
              icon: 'error',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            });
          });
      });
    }

  </script>
</body>

</html>
