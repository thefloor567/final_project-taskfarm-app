<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('유저 상세')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>

    <div class="admin-content">

      <a href="/admin/users" class="btn btn-sm btn-light mb-4">
        <i class="ki-duotone ki-arrow-left fs-4"><span class="path1"></span><span class="path2"></span></i>
        목록으로
      </a>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex align-items-center gap-4">
            <div class="d-flex align-items-center justify-content-center rounded-circle bg-light-primary"
              style="width:64px;height:64px;font-size:32px;">🧑‍🌾</div>
            <div>
              <h2 class="fw-bolder fs-3 text-gray-900 mb-1" id="nickname">유저</h2>
              <p class="text-gray-500 fs-7 mb-0" id="email">email</p>
              <div class="mt-2" id="statusArea"></div>
            </div>
            <div class="ms-auto text-end">
              <span class="badge badge-light-primary fs-6" id="level">Lv.1</span>
              <div class="fs-8 text-gray-400 mt-1" id="joinDate">가입일 -</div>
              <div class="mt-3" id="actionArea"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-sm-3">
          <div class="card shadow-sm h-100">
            <div class="card-body text-center py-4">
              <div class="fw-bolder fs-2 text-primary" id="doneCount">0</div>
              <div class="fs-8 text-gray-500">완료한 할일</div>
            </div>
          </div>
        </div>
        <div class="col-sm-3">
          <div class="card shadow-sm h-100">
            <div class="card-body text-center py-4">
              <div class="fw-bolder fs-2 text-success" id="completionRate">0%</div>
              <div class="fs-8 text-gray-500">완료율</div>
            </div>
          </div>
        </div>
        <div class="col-sm-3">
          <div class="card shadow-sm h-100">
            <div class="card-body text-center py-4">
              <div class="fw-bolder fs-2 text-warning" id="totalXp">0</div>
              <div class="fs-8 text-gray-500">누적 XP</div>
            </div>
          </div>
        </div>
        <div class="col-sm-3">
          <div class="card shadow-sm h-100">
            <div class="card-body text-center py-4">
              <div class="fw-bolder fs-2 text-info" id="cropCount">0</div>
              <div class="fs-8 text-gray-500">수확 작물</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header">
          <h3 class="card-title fs-5">최근 활동 (할일 완료)</h3>
        </div>
        <div class="card-body">
          <div id="activityChart"></div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script th:inline="javascript">
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    const userId = /*[[${userId}]]*/ 1;

    document.addEventListener('DOMContentLoaded', function () {
      fetch('/admin/api/users/' + userId)
        .then(res => res.json())
        .then(res => {
          const d = res.data;

          document.getElementById('nickname').textContent = d.nickname;
          document.getElementById('email').textContent = d.email;
          document.getElementById('level').textContent = 'Lv.' + d.level;
          document.getElementById('joinDate').textContent = '가입일 ' + d.joinDate;
          document.getElementById('doneCount').textContent = d.doneCount;
          document.getElementById('completionRate').textContent = d.completionRate + '%';
          document.getElementById('totalXp').textContent = d.totalXp.toLocaleString();
          document.getElementById('cropCount').textContent = d.cropCount;

          const isSuspended = d.status === 'SUSPENDED';

          document.getElementById('statusArea').innerHTML = isSuspended
            ? '<span class="badge badge-light-danger fs-7">정지</span>'
            : '<span class="badge badge-light-success fs-7">정상</span>';

          document.getElementById('actionArea').innerHTML = isSuspended
            ? `<button type="button" class="btn btn-sm btn-light-success" onclick="activateUser(${d.userId})">정지 해제</button>`
            : `<button type="button" class="btn btn-sm btn-light-danger" onclick="suspendUser(${d.userId})">유저 정지</button>`;

          if (typeof ApexCharts !== 'undefined') {
            new ApexCharts(document.getElementById('activityChart'), {
              series: [{ name: '완료', data: d.activityData }],
              chart: { type: 'bar', height: 280, toolbar: { show: false } },
              plotOptions: { bar: { borderRadius: 6, columnWidth: '45%' } },
              colors: ['#3699FF'],
              xaxis: { categories: d.activityLabels },
              dataLabels: { enabled: false }
            }).render();
          }
        })
        .catch(err => console.error(err));
    });

    function suspendUser(userId) {
      Swal.fire({
        title: '유저를 정지하시겠습니까?',
        text: '정지된 유저는 로그인할 수 없습니다.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '정지',
        cancelButtonText: '취소',
        customClass: {
          confirmButton: 'btn btn-danger',
          cancelButton: 'btn btn-light'
        },
        buttonsStyling: false
      }).then((result) => {
        if (!result.isConfirmed) {
          return;
        }

        fetch(`/admin/api/users/${userId}/suspend`, {
          method: 'PATCH'
        })
          .then(res => res.json())
          .then(res => {
            if (!res.result) {
              Swal.fire({
                title: '실패',
                text: res.message || '유저 정지에 실패했습니다.',
                icon: 'error',
                confirmButtonText: '확인',
                customClass: {
                  confirmButton: 'btn btn-primary'
                },
                buttonsStyling: false
              });
              return;
            }

            Swal.fire({
              title: '완료',
              text: '유저가 정지되었습니다.',
              icon: 'success',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            }).then(() => {
              location.reload();
            });
          })
          .catch(err => {
            console.error(err);
            Swal.fire({
              title: '오류',
              text: '유저 정지 중 오류가 발생했습니다.',
              icon: 'error',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            });
          });
      });
    }

    function activateUser(userId) {
      Swal.fire({
        title: '정지를 해제하시겠습니까?',
        text: '해당 유저가 다시 로그인할 수 있습니다.',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '정지 해제',
        cancelButtonText: '취소',
        customClass: {
          confirmButton: 'btn btn-success',
          cancelButton: 'btn btn-light'
        },
        buttonsStyling: false
      }).then((result) => {
        if (!result.isConfirmed) {
          return;
        }

        fetch(`/admin/api/users/${userId}/activate`, {
          method: 'PATCH'
        })
          .then(res => res.json())
          .then(res => {
            if (!res.result) {
              Swal.fire({
                title: '실패',
                text: res.message || '유저 정지 해제에 실패했습니다.',
                icon: 'error',
                confirmButtonText: '확인',
                customClass: {
                  confirmButton: 'btn btn-primary'
                },
                buttonsStyling: false
              });
              return;
            }

            Swal.fire({
              title: '완료',
              text: '유저 정지가 해제되었습니다.',
              icon: 'success',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            }).then(() => {
              location.reload();
            });
          })
          .catch(err => {
            console.error(err);
            Swal.fire({
              title: '오류',
              text: '유저 정지 해제 중 오류가 발생했습니다.',
              icon: 'error',
              confirmButtonText: '확인',
              customClass: {
                confirmButton: 'btn btn-primary'
              },
              buttonsStyling: false
            });
          });
      });
    }
  </script>
</body>

</html>
