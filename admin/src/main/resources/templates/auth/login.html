<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('관리자 로그인')}"></head>

<body>
  <div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="w-100" style="max-width:400px;">

      <div class="text-center mb-8">
        <div style="font-size:56px;">🌾</div>
        <h1 class="fw-bolder fs-2x text-gray-900 mt-3">TaskFarm <span class="text-primary">Admin</span></h1>
        <p class="text-gray-500 fs-6 mt-2">관리자 전용 페이지입니다</p>
      </div>

      <!-- ───── 1단계: 이메일/비번 ───── -->
      <div id="step-login" class="card shadow-sm">
        <div class="card-body p-5 d-flex flex-column gap-3">
          <div>
            <label class="form-label fw-semibold text-gray-700">관리자 이메일</label>
            <input type="email" id="email" class="form-control form-control-lg" placeholder="admin@taskfarm.com">
          </div>
          <div>
            <label class="form-label fw-semibold text-gray-700">비밀번호</label>
            <input type="password" id="password" class="form-control form-control-lg"
              onkeyup="if(event.key==='Enter') handleLogin()">
          </div>
          <button type="button" class="btn btn-primary btn-lg w-100 mt-2" onclick="handleLogin()">로그인</button>
        </div>
      </div>

      <!-- ───── 2단계: OTP 입력 (MFA_REQUIRED) ───── -->
      <div id="step-otp" class="card shadow-sm" style="display:none;">
        <div class="card-body p-5 d-flex flex-column gap-3">
          <div class="text-center mb-2">
            <i class="ki-duotone ki-shield-tick fs-3x text-primary"></i>
            <h3 class="fw-bold mt-2">2단계 인증</h3>
            <p class="text-gray-500 fs-7">구글 OTP 앱의 6자리 코드를 입력하세요</p>
          </div>
          <input type="text" id="otpCode" class="form-control form-control-lg text-center"
            inputmode="numeric" maxlength="6" placeholder="000000"
            style="letter-spacing:8px; font-size:24px;"
            onkeyup="if(event.key==='Enter') handleOtp()">
          <button type="button" class="btn btn-primary btn-lg w-100" onclick="handleOtp()">인증</button>
          <button type="button" class="btn btn-light btn-sm" onclick="backToLogin()">← 처음으로</button>
        </div>
      </div>

      <!-- ───── 3단계: 강제 등록 (SETUP_REQUIRED) ───── -->
      <div id="step-setup" class="card shadow-sm" style="display:none;">
        <div class="card-body p-5 d-flex flex-column gap-3">
          <div class="text-center mb-2">
            <h3 class="fw-bold">MFA 등록이 필요합니다</h3>
            <p class="text-gray-500 fs-7">보안을 위해 2단계 인증을 등록하세요.<br>구글 OTP 앱으로 아래 QR을 스캔하세요.</p>
          </div>
          <div class="text-center">
            <img id="qrImg" src="" alt="QR" style="width:200px; height:200px;" class="border rounded">
          </div>
          <div class="text-center">
            <span class="text-gray-500 fs-8">수동 입력 키</span>
            <div id="manualKey" class="fw-bold fs-7 text-gray-700" style="word-break:break-all;"></div>
          </div>
          <input type="text" id="setupCode" class="form-control form-control-lg text-center"
            inputmode="numeric" maxlength="6" placeholder="앱의 6자리 입력"
            style="letter-spacing:8px; font-size:24px;"
            onkeyup="if(event.key==='Enter') handleConfirmSetup()">
          <button type="button" class="btn btn-primary btn-lg w-100" onclick="handleConfirmSetup()">등록 완료</button>
          <button type="button" class="btn btn-light btn-sm" onclick="backToLogin()">← 처음으로</button>
        </div>
      </div>

      <p class="text-center text-gray-400 fs-8 mt-4">⚠️ 관리자 권한(ROLE_ADMIN)이 필요합니다</p>
    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // 단계 간 공유 상태
    let mfaEmail = '';
    let mfaPassword = '';
    let mfaSecret = '';

    function showStep(id) {
      ['step-login', 'step-otp', 'step-setup'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? '' : 'none';
      });
    }
    function backToLogin() { showStep('step-login'); }

    function swalError(msg) {
      Swal.fire({ text: msg || "오류가 발생했습니다.", icon: "error",
        buttonsStyling: false, confirmButtonText: "확인",
        customClass: { confirmButton: "btn btn-danger" } });
    }
    function setToken(token) {
      document.cookie = `token=${token}; path=/admin; max-age=86400`;
    }

    // ───── 1단계: 이메일/비번 로그인 ─────
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        return Swal.fire({ text: "이메일과 비밀번호를 입력해주세요.", icon: "warning",
          buttonsStyling: false, confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" } });
      }
      mfaEmail = email; mfaPassword = password;

      fetch('/admin/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include', body: JSON.stringify({ email, password })
      })
        .then(res => res.json())
        .then(res => {
          if (!res.result) return swalError(res.message || "로그인 실패");
          const data = res.data;
          switch (data.status) {
            case 'SUCCESS':
              setToken(data.token);
              location.href = '/admin/dashboard';
              break;
            case 'MFA_REQUIRED':
              showStep('step-otp');
              document.getElementById('otpCode').focus();
              break;
            case 'SETUP_REQUIRED':
              startSetup();
              break;
            default:
              swalError("알 수 없는 응답입니다.");
          }
        })
        .catch(err => { console.error(err); swalError(); });
    }

    // ───── 2단계: OTP 검증 (비번+OTP 재전송) ─────
    function handleOtp() {
      const otpCode = document.getElementById('otpCode').value.trim();
      if (!/^\d{6}$/.test(otpCode)) return swalError("6자리 숫자를 입력하세요.");

      fetch('/admin/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email: mfaEmail, password: mfaPassword, otpCode })
      })
        .then(res => res.json())
        .then(res => {
          if (!res.result) return swalError(res.message || "인증 실패");
          if (res.data.status === 'SUCCESS') {
            setToken(res.data.token);
            location.href = '/admin/dashboard';
          } else {
            swalError("인증에 실패했습니다.");
          }
        })
        .catch(err => { console.error(err); swalError(); });
    }

    // ───── 3단계: 강제 등록 시작 (QR 받기) ─────
    function startSetup() {
      fetch('/admin/api/mfa/setup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email: mfaEmail, password: mfaPassword })
      })
        .then(res => res.json())
        .then(res => {
          if (!res.result) return swalError(res.message || "등록 시작 실패");
          mfaSecret = res.data.secret;
          document.getElementById('qrImg').src = res.data.qrDataUri;
          document.getElementById('manualKey').textContent = res.data.manualKey;
          showStep('step-setup');
          document.getElementById('setupCode').focus();
        })
        .catch(err => { console.error(err); swalError(); });
    }

    // ───── 3단계: 등록 확정 (검증+저장+토큰) ─────
    function handleConfirmSetup() {
      const code = document.getElementById('setupCode').value.trim();
      if (!/^\d{6}$/.test(code)) return swalError("6자리 숫자를 입력하세요.");

      fetch('/admin/api/mfa/confirm', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email: mfaEmail, password: mfaPassword, secret: mfaSecret, code })
      })
        .then(res => res.json())
        .then(res => {
          if (!res.result) return swalError(res.message || "등록 실패");
          if (res.data.status === 'SUCCESS') {
            Swal.fire({ text: "MFA 등록이 완료되었습니다.", icon: "success",
              buttonsStyling: false, confirmButtonText: "확인",
              customClass: { confirmButton: "btn btn-primary" } })
              .then(() => { setToken(res.data.token); location.href = '/admin/dashboard'; });
          } else {
            swalError("등록에 실패했습니다.");
          }
        })
        .catch(err => { console.error(err); swalError(); });
    }
  </script>
</body>

</html>
