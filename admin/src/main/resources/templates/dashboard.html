<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('대시보드')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <div class="admin-content">

      <h1 class="fw-bolder fs-2 text-gray-900 mb-1">대시보드</h1>
      <p class="text-gray-500 fs-6 mb-6">TaskFarm 서비스 현황 요약</p>

      <!-- 요약 카드 4종 -->
      <div class="row g-4 mb-6">
        <div class="col-sm-6 col-xl-3">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fs-7 text-gray-500">총 가입자</div>
                  <div class="fw-bolder fs-2 text-gray-900 mt-1" id="totalUsers">0</div>
                </div>
                <span style="font-size:32px;">👥</span>
              </div>
              <div class="fs-8 text-success mt-2" id="newUsers">+0 오늘</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fs-7 text-gray-500">전체 완료율</div>
                  <div class="fw-bolder fs-2 text-gray-900 mt-1" id="completionRate">0%</div>
                </div>
                <span style="font-size:32px;">✅</span>
              </div>
              <div class="fs-8 text-gray-400 mt-2">할일 완료 기준</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fs-7 text-gray-500">Gemini 호출</div>
                  <div class="fw-bolder fs-2 text-gray-900 mt-1" id="geminiCalls">0</div>
                </div>
                <span style="font-size:32px;">✨</span>
              </div>
              <div class="fs-8 text-info mt-2" id="cacheRate">캐시 적중 0%</div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-xl-3">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fs-7 text-gray-500">예상 비용</div>
                  <div class="fw-bolder fs-2 text-gray-900 mt-1" id="geminiCost">$0</div>
                </div>
                <span style="font-size:32px;">💰</span>
              </div>
              <div class="fs-8 text-gray-400 mt-2">이번 달 Gemini</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 차트 영역 -->
      <div class="row g-4">
        <div class="col-xl-8">
          <div class="card shadow-sm h-100">
            <div class="card-header">
              <h3 class="card-title fs-5">최근 7일 가입자 추이</h3>
            </div>
            <div class="card-body">
              <div id="signupChart"></div>
            </div>
          </div>
        </div>
        <div class="col-xl-4">
          <div class="card shadow-sm h-100">
            <div class="card-header">
              <h3 class="card-title fs-5">Gemini 호출 vs 캐시</h3>
            </div>
            <div class="card-body d-flex align-items-center justify-content-center">
              <div id="cacheChart"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // 어드민 로그아웃 (사이드바에서 호출)
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    document.addEventListener('DOMContentLoaded', function () {
      fetch('/admin/api/home')
        .then(res => res.json())
        .then(res => {
          const d = res.data;
          document.getElementById('totalUsers').textContent = d.totalUsers.toLocaleString();
          document.getElementById('newUsers').textContent = '+' + d.todayUsers + ' 오늘';
          document.getElementById('completionRate').textContent = d.completionRate + '%';
          renderSignupChart(d.signupLabels, d.signupData);
        })
        .catch(err => console.error(err));

      // Gemini 사용량 (tbAiLog 기반)
      fetch('/admin/api/gemini/usage')
        .then(res => res.json())
        .then(res => {
          const g = res.data;
          document.getElementById('geminiCalls').textContent = g.totalRequests.toLocaleString();
          document.getElementById('cacheRate').textContent = '캐시 적중 ' + g.cacheRate + '%';
          document.getElementById('geminiCost').textContent = '$' + g.monthCost.toFixed(2);
          renderCacheChart(g.cacheHits, g.actualCalls);
        })
        .catch(err => console.error(err));
    });

    function renderSignupChart(signupLabels, signupData) {
      if (typeof ApexCharts === 'undefined') { console.warn('ApexCharts 없음'); return; }

      new ApexCharts(document.getElementById('signupChart'), {
        series: [{ name: '가입자', data: signupData }],
        chart: { type: 'area', height: 300, toolbar: { show: false } },
        colors: ['#3699FF'],
        stroke: { curve: 'smooth', width: 3 },
        fill: { type: 'gradient', gradient: { opacityFrom: 0.4, opacityTo: 0.1 } },
        xaxis: { categories: signupLabels },
        dataLabels: { enabled: false }
      }).render();
    }

    function renderCacheChart(cacheHits, actualCalls) {
      if (typeof ApexCharts === 'undefined') return;
      new ApexCharts(document.getElementById('cacheChart'), {
        series: [cacheHits, actualCalls],
        chart: { type: 'donut', height: 260 },
        labels: ['캐시 적중', '신규 호출'],
        colors: ['#0BB783', '#FFA800'],
        legend: { position: 'bottom' },
        noData: { text: '데이터 없음' }
      }).render();
    }
  </script>
</body>

</html>
