<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('우편 발송')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('mails')}"></div>

    <div class="admin-content">

      <h1 class="fw-bolder fs-2 text-gray-900 mb-1">우편 발송</h1>
      <p class="text-gray-500 fs-6 mb-6">운영 보상·공지 우편 일괄 발송 (점검보상·사과보상 등)</p>

      <!-- 안내 -->
      <div class="card shadow-sm mb-4 border-0" style="background:#FFF8DD;">
        <div class="card-body py-3">
          <span class="fs-7 text-gray-700">
            📮 보상은 <b>코인만</b> 가능합니다 (물방울 지급 불가 — 재화 원칙 / 칭호는 업적·랭킹으로만 획득).
            동일 <b>RefKey</b>로는 중복 발송되지 않아요(멱등). 점검보상 등은 RefKey를 꼭 지정하세요.
          </span>
        </div>
      </div>

      <div class="row g-4">
        <!-- 발송 폼 -->
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <div class="card-header"><h3 class="card-title fs-5">새 우편 작성</h3></div>
            <div class="card-body d-flex flex-column gap-4">

              <!-- 대상 -->
              <div>
                <label class="form-label fw-semibold text-gray-700">발송 대상</label>
                <select id="targetType" class="form-select" onchange="onTargetChange()">
                  <option value="ALL">전체 유저</option>
                  <option value="USER">특정 유저 (ID 지정)</option>
                </select>
              </div>
              <div id="userIdWrap" class="d-none">
                <label class="form-label fw-semibold text-gray-700">유저 ID (쉼표로 여러 명)</label>
                <input type="text" id="targetUserIds" class="form-control" placeholder="예: 12, 34, 56">
              </div>

              <!-- 제목/내용 -->
              <div>
                <label class="form-label fw-semibold text-gray-700">제목</label>
                <input type="text" id="title" class="form-control" maxlength="50" placeholder="예: 서버 점검 보상">
              </div>
              <div>
                <label class="form-label fw-semibold text-gray-700">내용</label>
                <textarea id="body" class="form-control" rows="3" maxlength="200"
                          placeholder="점검에 협조해주셔서 감사합니다. 보상을 받아주세요."></textarea>
              </div>

              <!-- 보상 -->
              <div class="row g-3">
                <div class="col-sm-5">
                  <label class="form-label fw-semibold text-gray-700">보상 종류</label>
                  <select id="rewardType" class="form-select" onchange="onRewardChange()">
                    <option value="NONE">없음 (공지)</option>
                    <option value="COIN">코인</option>
                  </select>
                </div>
                <div class="col-sm-7" id="rewardCoinWrap" style="display:none;">
                  <label class="form-label fw-semibold text-gray-700">코인</label>
                  <input type="number" id="rewardCoin" class="form-control" min="0" value="0">
                </div>
              </div>

              <!-- RefKey -->
              <div>
                <label class="form-label fw-semibold text-gray-700">RefKey (중복 발송 방지)</label>
                <input type="text" id="refKey" class="form-control" placeholder="예: maint-2026-06-11">
                <div class="fs-9 text-gray-400 mt-1">같은 키로는 한 번만 발송됩니다. 빈칸이면 자동 생성돼요.</div>
              </div>

              <button class="btn btn-primary" onclick="send()">우편 발송</button>
            </div>
          </div>
        </div>

        <!-- 최근 발송 이력 -->
        <div class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-header"><h3 class="card-title fs-5">최근 발송</h3></div>
            <div class="card-body">
              <div id="historyList" class="d-flex flex-column gap-2">
                <div class="text-gray-400 fs-8 text-center py-4">불러오는 중…</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    // 🚧 API (어드민 /admin/api):
    //   POST /admin/api/ops/mails/broadcast
    //     body:{ targetType:'ALL'|'USER', targetUserIds:[..], title, body,
    //            rewardType:'NONE'|'COIN', rewardCoin, refKey }
    //     → tbMail에 대상 유저 수만큼 insert. RefKey uk로 멱등(재발송 시 중복 X).
    //     ⚠️ 보상은 코인만. 물방울·칭호 발송 불가 (칭호는 업적·랭킹 전용).
    //   GET  /admin/api/ops/mails/history?limit=20
    //     → data:[{ refKey, title, targetType, sentCount, rewardSummary, createDate }]
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    document.addEventListener('DOMContentLoaded', loadHistory);

    function onTargetChange() {
      const t = document.getElementById('targetType').value;
      document.getElementById('userIdWrap').classList.toggle('d-none', t !== 'USER');
    }
    function onRewardChange() {
      const r = document.getElementById('rewardType').value;
      document.getElementById('rewardCoinWrap').style.display = r === 'COIN' ? '' : 'none';
    }

    function send() {
      const targetType = document.getElementById('targetType').value;
      const title = document.getElementById('title').value.trim();
      const body = document.getElementById('body').value.trim();
      const rewardType = document.getElementById('rewardType').value;
      const refKey = document.getElementById('refKey').value.trim();

      if (!title) return warn('제목을 입력해주세요.');

      let targetUserIds = [];
      if (targetType === 'USER') {
        targetUserIds = document.getElementById('targetUserIds').value
          .split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        if (!targetUserIds.length) return warn('유저 ID를 하나 이상 입력해주세요.');
      }

      const payload = { targetType, targetUserIds, title, body, rewardType, refKey };
      if (rewardType === 'COIN') {
        payload.rewardCoin = parseInt(document.getElementById('rewardCoin').value) || 0;
        if (payload.rewardCoin < 0) return warn('코인은 0 이상이어야 합니다.');
      }

      const targetText = targetType === 'ALL' ? '전체 유저' : `${targetUserIds.length}명`;
      Swal.fire({
        html: `<b>${targetText}</b>에게 우편을 발송할까요?<br><span class="fs-7 text-gray-500">${title}</span>`,
        icon: 'question', showCancelButton: true, confirmButtonText: '발송', cancelButtonText: '취소',
        buttonsStyling: false, customClass: { confirmButton: 'btn btn-primary', cancelButton: 'btn btn-light' }
      }).then(c => {
        if (!c.isConfirmed) return;
        fetch('/admin/api/ops/mails/broadcast', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(res => res.json())
          .then(res => {
            if (res.result) { ok(`발송 완료 (${res.data?.sentCount ?? '?'}건)`); resetForm(); loadHistory(); }
            else warn(res.message || '발송 실패');
          })
          .catch(() => warn('발송 중 오류가 발생했습니다.'));
      });
    }

    function resetForm() {
      ['title','body','targetUserIds','refKey'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('rewardCoin').value = 0;
    }

    function loadHistory() {
      fetch('/admin/api/ops/mails/history?limit=20')
        .then(res => res.json())
        .then(res => renderHistory(res.data || []))
        .catch(() => {
          document.getElementById('historyList').innerHTML =
            '<div class="text-danger fs-8 text-center py-4">이력을 불러오지 못했어요.</div>';
        });
    }
    function renderHistory(list) {
      const box = document.getElementById('historyList');
      if (!list.length) { box.innerHTML = '<div class="text-gray-400 fs-8 text-center py-4">발송 이력이 없어요.</div>'; return; }
      box.innerHTML = list.map(h => `
        <div class="border rounded p-3">
          <div class="d-flex justify-content-between align-items-start">
            <span class="fw-semibold fs-7 text-gray-900">${h.title}</span>
            <span class="badge badge-sm badge-light-secondary">${h.sentCount}명</span>
          </div>
          <div class="fs-9 text-gray-500 mt-1">${h.rewardSummary || '보상 없음'} · ${h.createDate || ''}</div>
          <div class="fs-9 text-gray-400">RefKey: ${h.refKey}</div>
        </div>`).join('');
    }

    function warn(msg) {
      Swal.fire({ text: msg, icon: 'warning', buttonsStyling: false,
        confirmButtonText: '확인', customClass: { confirmButton: 'btn btn-primary' } });
    }
    function ok(msg) {
      Swal.fire({ text: msg, icon: 'success', buttonsStyling: false,
        confirmButtonText: '확인', customClass: { confirmButton: 'btn btn-primary' } });
    }
  </script>
</body>

</html>
