<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head></head>

<body>

  <!-- active 인자로 현재 메뉴 강조 -->
  <th:block th:fragment="sidebar(active)">
    <div class="admin-sidebar">

      <!-- 브랜드 -->
      <div class="d-flex align-items-center gap-2 px-4 py-4 border-bottom border-dark">
        <span style="font-size:24px;">🌾</span>
        <span class="brand-text fw-bolder fs-5">TaskFarm <span class="text-primary">Admin</span></span>
      </div>

      <!-- 메뉴 -->
      <div class="py-3 flex-grow-1">
        <a th:href="@{/dashboard}" class="admin-menu-item" th:classappend="${active == 'dashboard'} ? 'active'">
          <i class="ki-duotone ki-element-11 fs-3"><span class="path1"></span><span class="path2"></span><span
              class="path3"></span><span class="path4"></span></i>
          <span class="menu-label">대시보드</span>
        </a>
        <a th:href="@{/users}" class="admin-menu-item" th:classappend="${active == 'users'} ? 'active'">
          <i class="ki-duotone ki-profile-user fs-3"><span class="path1"></span><span class="path2"></span><span
              class="path3"></span><span class="path4"></span></i>
          <span class="menu-label">유저 관리</span>
        </a>
        <a th:href="@{/stats}" class="admin-menu-item" th:classappend="${active == 'stats'} ? 'active'">
          <i class="ki-duotone ki-chart-simple fs-3"><span class="path1"></span><span class="path2"></span><span
              class="path3"></span><span class="path4"></span></i>
          <span class="menu-label">서비스 통계</span>
        </a>
        <a th:href="@{/gemini}" class="admin-menu-item" th:classappend="${active == 'gemini'} ? 'active'">
          <i class="ki-duotone ki-abstract-26 fs-3"><span class="path1"></span><span class="path2"></span></i>
          <span class="menu-label">Gemini 모니터링</span>
        </a>

        <!-- 정책 그룹 -->
        <div class="px-4 pt-4 pb-2">
          <span class="menu-label fs-9 fw-bold text-uppercase" style="color:#565674;">정책 관리</span>
        </div>
        <a th:href="@{/policies/exp}" class="admin-menu-item" th:classappend="${active == 'exp'} ? 'active'">
          <i class="ki-duotone ki-star fs-3"><span class="path1"></span></i>
          <span class="menu-label">경험치 정책</span>
        </a>
        <a th:href="@{/policies/shop}" class="admin-menu-item" th:classappend="${active == 'shop'} ? 'active'">
          <i class="ki-duotone ki-handcart fs-3"><span class="path1"></span></i>
          <span class="menu-label">상점 정책</span>
        </a>
        <a th:href="@{/policies/events}" class="admin-menu-item" th:classappend="${active == 'events'} ? 'active'">
          <i class="ki-duotone ki-gift fs-3"><span class="path1"></span><span class="path2"></span><span
              class="path3"></span><span class="path4"></span></i>
          <span class="menu-label">이벤트 정책</span>
        </a>
        <a th:href="@{/policies/achievements}" class="admin-menu-item"
          th:classappend="${active == 'achievements'} ? 'active'">
          <i class="ki-duotone ki-medal-star fs-3"><span class="path1"></span><span class="path2"></span><span
              class="path3"></span><span class="path4"></span></i>
          <span class="menu-label">업적 관리</span>
        </a>

        <!-- 운영 그룹 -->
        <div class="px-4 pt-4 pb-2">
          <span class="menu-label fs-9 fw-bold text-uppercase" style="color:#565674;">운영</span>
        </div>
        <a th:href="@{/rank}" class="admin-menu-item" th:classappend="${active == 'rankAudit'} ? 'active'">
          <i class="ki-duotone ki-medal-star fs-3"><span class="path1"></span><span class="path2"></span><span
              class="path3"></span><span class="path4"></span></i>
          <span class="menu-label">랭킹 감사</span>
        </a>
        <a th:href="@{/mails}" class="admin-menu-item" th:classappend="${active == 'mails'} ? 'active'">
          <i class="ki-duotone ki-sms fs-3"><span class="path1"></span><span class="path2"></span></i>
          <span class="menu-label">우편 발송</span>
        </a>
        <a th:href="@{/security}" class="admin-menu-item" th:classappend="${active == 'security'} ? 'active'">
          <i class="ki-duotone ki-shield-tick fs-3"><span class="path1"></span><span class="path2"></span></i>
          <span class="menu-label">보안 설정 (MFA)</span>
        </a>
      </div>

      <!-- 로그아웃 -->
      <div class="border-top border-dark">
        <a href="#" onclick="adminLogout(); return false;" class="admin-menu-item">
          <i class="ki-duotone ki-exit-right fs-3"><span class="path1"></span><span class="path2"></span></i>
          <span class="menu-label">로그아웃</span>
        </a>
      </div>

    </div>
  </th:block>

</body>

</html>
