<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('이벤트 정책')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('events')}"></div>

    <div class="admin-content">

      <h1 class="fw-bolder fs-2 text-gray-900 mb-1">이벤트 정책</h1>
      <p class="text-gray-500 fs-6 mb-6">스트릭 구간별 이벤트 풀·가중치 조정</p>

      <!-- 안내 -->
      <div class="card shadow-sm mb-4 border-0" style="background:#F1FAFF;">
        <div class="card-body py-3">
          <span class="fs-7 text-gray-700">
            🎲 이벤트는 서버가 <b>(유저ID + 날짜)</b>를 시드로 고정 생성합니다.
            같은 날 리롤은 불가하며, 스트릭이 높을수록 좋은 이벤트 풀이 열립니다.
            출현 비중은 구간 내 <b>가중치(Weight)</b> 합으로 정규화됩니다.
          </span>
        </div>
      </div>

      <!-- 스트릭 구간 선택 탭 (동적 생성) -->
      <div class="d-flex gap-2 mb-4 flex-wrap" id="streakTabs"></div>

      <!-- 가중치 합계 표시 -->
      <div class="card shadow-sm mb-4">
        <div class="card-body py-3 d-flex justify-content-between align-items-center">
          <span class="fw-semibold fs-6 text-gray-700">현재 구간 가중치 합계 (활성 항목)</span>
          <span class="fw-bolder fs-3 text-primary" id="totalWeight">0</span>
        </div>
      </div>

      <!-- 이벤트 풀 테이블 -->
      <div class="card shadow-sm">
        <div class="card-header">
          <h3 class="card-title fs-5">이벤트 풀</h3>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-row-bordered align-middle">
              <thead>
                <tr class="fw-bold fs-7 text-gray-500 text-uppercase">
                  <th>이벤트 키</th>
                  <th style="width:160px;">가중치</th>
                  <th style="width:120px;">활성</th>
                  <th style="width:100px;" class="text-end">저장</th>
                </tr>
              </thead>
              <tbody id="eventTableBody"></tbody>
            </table>
          </div>
          <div class="fs-8 text-gray-400 mt-2">
            💡 가중치가 높을수록 해당 이벤트가 더 자주 출현합니다. 비활성 항목은 풀에서 제외됩니다.
          </div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    let allEvents = [];      // 전체 이벤트 (API 응답)
    let streaks = [];        // 정렬된 distinct streakMin 값들
    let currentStreak = null;

    document.addEventListener('DOMContentLoaded', function () {
      fetch('/admin/api/policies/events')
        .then(res => res.json())
        .then(res => {
          allEvents = res.data;
          streaks = [...new Set(allEvents.map(e => e.streakMin))].sort((a, b) => a - b);
          currentStreak = streaks[0];
          renderTabs();
          render();
        })
        .catch(err => console.error(err));
    });

    function renderTabs() {
      const wrap = document.getElementById('streakTabs');
      wrap.innerHTML = '';
      streaks.forEach(s => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm streak-btn ' + (s === currentStreak ? 'btn-primary' : 'btn-light');
        btn.textContent = `🔥 ${s}일+`;
        btn.style.width = '120px';
        btn.onclick = () => { currentStreak = s; renderTabs(); render(); };
        wrap.appendChild(btn);
      });
    }

    function render() {
      const tbody = document.getElementById('eventTableBody');
      tbody.innerHTML = '';
      allEvents.filter(e => e.streakMin === currentStreak).forEach(e => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="fw-semibold fs-6 text-gray-800">${e.eventKey}</td>
          <td><input type="number" class="form-control form-control-sm" min="0" value="${e.weight}" id="weight-${e.id}" onchange="updateTotal()"></td>
          <td>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="active-${e.id}" ${e.active ? 'checked' : ''} onchange="updateTotal()">
            </div>
          </td>
          <td class="text-end"><button class="btn btn-sm btn-light-primary" onclick="saveEvent(${e.id})">저장</button></td>
        `;
        tbody.appendChild(tr);
      });
      updateTotal();
    }

    function updateTotal() {
      let total = 0;
      allEvents.filter(e => e.streakMin === currentStreak).forEach(e => {
        const active = document.getElementById('active-' + e.id).checked;
        const w = parseInt(document.getElementById('weight-' + e.id).value) || 0;
        if (active) total += w;
      });
      document.getElementById('totalWeight').textContent = total;
    }

    function saveEvent(id) {
      const weight = parseInt(document.getElementById('weight-' + id).value);
      const active = document.getElementById('active-' + id).checked;

      if (isNaN(weight) || weight < 0) {
        return Swal.fire({
          text: "0 이상의 숫자를 입력해주세요.", icon: "warning",
          buttonsStyling: false, confirmButtonText: "확인",
          customClass: { confirmButton: "btn btn-primary" }
        });
      }

      fetch(`/admin/api/policies/events/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ weight, active })
      })
        .then(res => res.json())
        .then(res => {
          if (res.result) {
            const e = allEvents.find(x => x.id === id);
            e.weight = weight; e.active = active;
            Swal.fire({
              text: "이벤트 정책이 저장되었습니다.", icon: "success",
              buttonsStyling: false, confirmButtonText: "확인",
              customClass: { confirmButton: "btn btn-primary" }
            });
          } else {
            Swal.fire({
              text: res.message || "저장 실패", icon: "error",
              buttonsStyling: false, confirmButtonText: "확인",
              customClass: { confirmButton: "btn btn-danger" }
            });
          }
        });
    }
  </script>
</body>

</html>
