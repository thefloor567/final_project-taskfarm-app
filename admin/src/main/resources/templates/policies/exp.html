<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('경험치 정책')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('exp')}"></div>

    <div class="admin-content">

      <h1 class="fw-bolder fs-2 text-gray-900 mb-1">경험치 정책</h1>
      <p class="text-gray-500 fs-6 mb-6">난이도별 XP·물방울 지급량 밸런스 조정</p>

      <!-- 안내 -->
      <div class="card shadow-sm mb-4 border-0" style="background:#FFF8DD;">
        <div class="card-body py-3">
          <span class="fs-7 text-gray-700">
            ⚖️ 값을 수정하면 이후 적립부터 반영됩니다. 신중하게 조정하세요.
          </span>
        </div>
      </div>

      <!-- 우선순위별 XP 정책 -->
      <div class="card shadow-sm mb-4">
        <div class="card-header">
          <h3 class="card-title fs-5">우선순위별 완료 XP</h3>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-row-bordered align-middle">
              <thead>
                <tr class="fw-bold fs-7 text-gray-500 text-uppercase">
                  <th>우선순위</th>
                  <th style="width:160px;">완료 XP</th>
                  <th style="width:180px;">완료 시 물방울</th>
                  <th style="width:120px;" class="text-end">저장</th>
                </tr>
              </thead>
              <tbody id="expTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 레벨업 보너스 정책 -->
      <div class="card shadow-sm">
        <div class="card-header">
          <h3 class="card-title fs-5">레벨업 보너스</h3>
        </div>
        <div class="card-body">
          <div class="row g-4 align-items-end">
            <div class="col-sm-4">
              <label class="form-label fw-semibold text-gray-700">레벨업 시 물방울</label>
              <input type="number" id="levelUpWater1" class="form-control" min="0">
            </div>
            <div class="col-sm-4">
              <button type="button" class="btn btn-primary w-100" onclick="saveLevelUp()">레벨업 보너스 저장</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    let policies = [];

    document.addEventListener('DOMContentLoaded', function () {
      fetch('/admin/api/policies/exp')
        .then(res => res.json())
        .then(res => {
          policies = res.data;
          renderTable();
          // 레벨업 보너스는 A/B/C 모두 같은 값이므로 첫 번째 정책에서 가져옴
          document.getElementById('levelUpWater1').value = policies[0]?.levelUpDrops ?? 5;
        })
        .catch(err => console.error(err));
    });

    const LABEL = { A: 'A · 급함', B: 'B · 보통', C: 'C · 여유' };
    const BADGE = { A: 'badge-light-danger', B: 'badge-light-warning', C: 'badge-light-secondary' };

    function renderTable() {
      const tbody = document.getElementById('expTableBody');
      tbody.innerHTML = '';
      policies.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="badge badge-sm ${BADGE[p.priority]}">${LABEL[p.priority]}</span></td>
          <td><input type="number" class="form-control form-control-sm" min="0" value="${p.baseExp}" id="xp-${p.id}"></td>
          <td><input type="number" class="form-control form-control-sm" min="0" value="${p.doneDrops}" id="water-${p.id}"></td>
          <td class="text-end"><button class="btn btn-sm btn-light-primary" onclick="savePolicy(${p.id})">저장</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function savePolicy(id) {
      const baseExp = parseInt(document.getElementById('xp-' + id).value);
      const doneDrops = parseInt(document.getElementById('water-' + id).value);
      const p = policies.find(x => x.id === id);

      if (isNaN(baseExp) || isNaN(doneDrops) || baseExp < 0 || doneDrops < 0) {
        return warn("0 이상의 숫자를 입력해주세요.");
      }

      fetch(`/admin/api/policies/exp/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ baseExp, doneDrops, levelUpDrops: p.levelUpDrops })
      })
        .then(res => res.json())
        .then(res => {
          if (res.result) { ok("정책이 저장되었습니다."); }
          else { warn(res.message || "저장 실패"); }
        });
    }

    function saveLevelUp() {
      const levelUpDrops = parseInt(document.getElementById('levelUpWater1').value);
      if (isNaN(levelUpDrops) || levelUpDrops < 0) {
        return warn("0 이상의 숫자를 입력해주세요.");
      }

      // 모든 우선순위에 같은 levelUpDrops 적용
      Promise.all(policies.map(p =>
        fetch(`/admin/api/policies/exp/${p.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ baseExp: p.baseExp, doneDrops: p.doneDrops, levelUpDrops })
        }).then(r => r.json())
      )).then(() => {
        policies.forEach(p => p.levelUpDrops = levelUpDrops);
        ok("레벨업 보너스가 저장되었습니다.");
      });
    }

    function warn(msg) {
      Swal.fire({
        text: msg, icon: "warning", buttonsStyling: false,
        confirmButtonText: "확인", customClass: { confirmButton: "btn btn-primary" }
      });
    }
    function ok(msg) {
      Swal.fire({
        text: msg, icon: "success", buttonsStyling: false,
        confirmButtonText: "확인", customClass: { confirmButton: "btn btn-primary" }
      });
    }
  </script>
</body>

</html>
