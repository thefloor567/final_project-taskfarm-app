<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('경험치 정책')}"></head>

<body>
  <div class="admin-wrap">

    <div th:replace="~{fragments/sidebar :: sidebar('exp')}"></div>

    <div class="admin-content">

      <h1 class="fw-bolder fs-2 text-gray-900 mb-1">경험치 정책</h1>
      <p class="text-gray-500 fs-6 mb-6">난이도별 XP·물방울 지급량 밸런스 조정</p>

      <!-- 안내 -->
      <div class="card shadow-sm mb-4 border-0" style="background:#FFF8DD;">
        <div class="card-body py-3">
          <span class="fs-7 text-gray-700">
            ⚖️ 값을 수정하면 이후 적립부터 반영됩니다. 신중하게 조정하세요.
          </span>
        </div>
      </div>

      <!-- 우선순위별 XP 정책 -->
      <div class="card shadow-sm mb-4">
        <div class="card-header">
          <h3 class="card-title fs-5">우선순위별 완료 XP</h3>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-row-bordered align-middle">
              <thead>
                <tr class="fw-bold fs-7 text-gray-500 text-uppercase">
                  <th>우선순위</th>
                  <th style="width:160px;">완료 XP</th>
                  <th style="width:180px;">완료 시 물방울</th>
                  <th style="width:120px;" class="text-end">저장</th>
                </tr>
              </thead>
              <tbody id="expTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 레벨업 보너스 정책 -->
      <div class="card shadow-sm">
        <div class="card-header">
          <h3 class="card-title fs-5">레벨업 보너스</h3>
        </div>
        <div class="card-body">
          <div class="row g-4 align-items-end">
            <div class="col-sm-4">
              <label class="form-label fw-semibold text-gray-700">레벨업 시 물방울 (1단계)</label>
              <input type="number" id="levelUpWater1" class="form-control" min="0">
            </div>
            <div class="col-sm-4">
              <label class="form-label fw-semibold text-gray-700">레벨업 시 물방울 (2단계)</label>
              <input type="number" id="levelUpWater2" class="form-control" min="0">
            </div>
            <div class="col-sm-4">
              <button type="button" class="btn btn-primary w-100" onclick="saveLevelUp()">레벨업 보너스 저장</button>
            </div>
          </div>
          <div class="fs-8 text-gray-400 mt-3">
            💧 2단계 지급: 레벨업 시 기본 물방울 + 추가 보너스 (명세서 "물방울 2단계 지급")
          </div>
        </div>
      </div>

    </div>
  </div>

  <script th:src="@{/plugins/global/plugins.bundle.js}"></script>
  <script th:src="@{/js/scripts.bundle.js}"></script>
  <script>
    function adminLogout() {
      document.cookie = 'token=; path=/admin; max-age=0';
      location.href = '/admin/';
    }

    // 🚧 더미. API(GET /api/admin/policies/exp) 나오면 교체.
    let policies = [
      { policyId: 1, priority: 'A', label: 'A · 급함', completeXp: 30, completeWater: 3 },
      { policyId: 2, priority: 'B', label: 'B · 보통', completeXp: 20, completeWater: 2 },
      { policyId: 3, priority: 'C', label: 'C · 여유', completeXp: 10, completeWater: 1 },
    ];
    let levelUp = { water1: 5, water2: 10 };

    document.addEventListener('DOMContentLoaded', function () {
      renderTable();
      document.getElementById('levelUpWater1').value = levelUp.water1;
      document.getElementById('levelUpWater2').value = levelUp.water2;
    });

    function renderTable() {
      const tbody = document.getElementById('expTableBody');
      tbody.innerHTML = '';
      policies.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>
                <span class="badge badge-sm ${p.priority === 'A' ? 'badge-light-danger' : p.priority === 'B' ? 'badge-light-warning' : 'badge-light-secondary'
          }">${p.label}</span>
            </td>
            <td>
                <input type="number" class="form-control form-control-sm" min="0"
                       value="${p.completeXp}" id="xp-${p.policyId}">
            </td>
            <td>
                <input type="number" class="form-control form-control-sm" min="0"
                       value="${p.completeWater}" id="water-${p.policyId}">
            </td>
            <td class="text-end">
                <button class="btn btn-sm btn-light-primary" onclick="savePolicy(${p.policyId})">저장</button>
            </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function savePolicy(policyId) {
      const xp = parseInt(document.getElementById('xp-' + policyId).value);
      const water = parseInt(document.getElementById('water-' + policyId).value);

      if (isNaN(xp) || isNaN(water) || xp < 0 || water < 0) {
        return warn("0 이상의 숫자를 입력해주세요.");
      }

      // 🚧 PATCH /api/admin/policies/exp/{policyId} {completeXp, completeWater}
      const p = policies.find(x => x.policyId === policyId);
      p.completeXp = xp; p.completeWater = water;
      ok("정책이 저장되었습니다.");
    }

    function saveLevelUp() {
      const w1 = parseInt(document.getElementById('levelUpWater1').value);
      const w2 = parseInt(document.getElementById('levelUpWater2').value);
      if (isNaN(w1) || isNaN(w2) || w1 < 0 || w2 < 0) {
        return warn("0 이상의 숫자를 입력해주세요.");
      }
      // 🚧 PATCH /api/admin/policies/exp/levelup {water1, water2}  (엔드포인트는 백엔드와 협의)
      levelUp.water1 = w1; levelUp.water2 = w2;
      ok("레벨업 보너스가 저장되었습니다.");
    }

    function warn(msg) {
      Swal.fire({
        text: msg, icon: "warning", buttonsStyling: false,
        confirmButtonText: "확인", customClass: { confirmButton: "btn btn-primary" }
      });
    }
    function ok(msg) {
      Swal.fire({
        text: msg, icon: "success", buttonsStyling: false,
        confirmButtonText: "확인", customClass: { confirmButton: "btn btn-primary" }
      });
    }
  </script>
</body>

</html>
